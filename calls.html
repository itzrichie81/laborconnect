<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Call History - LaborConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%232563eb'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-weight='800' font-family='Arial, sans-serif'>LC</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            min-height: 100vh;
            padding-bottom: 70px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== ACTIVE FLOATING BACKGROUND ANIMATION (SAME AS HOMEPAGE) ===== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .mesh-gradient {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(37, 99, 235, 0.15), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(139, 92, 246, 0.12), transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(6, 182, 212, 0.1), transparent 50%);
            animation: slowRotate 30s infinite linear;
        }

        @keyframes slowRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fast-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #2563eb;
            border-radius: 50%;
            opacity: 0;
            animation: fastFloat 6s infinite ease-in-out;
        }

        @keyframes fastFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: fastPulse 4s infinite alternate ease-in-out;
        }

        @keyframes fastPulse {
            0% { transform: scale(0.8); opacity: 0.3; }
            100% { transform: scale(1.4); opacity: 0.7; }
        }

        .dance-shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(139, 92, 246, 0.06));
            animation: dance 12s infinite alternate ease-in-out;
        }

        @keyframes dance {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(0deg) scale(1) translate(0, 0); }
            25% { border-radius: 58% 42% 75% 25% / 43% 37% 63% 57%; transform: rotate(90deg) scale(1.1) translate(20px, -20px); }
            50% { border-radius: 84% 16% 58% 42% / 55% 73% 27% 45%; transform: rotate(180deg) scale(1.2) translate(-20px, 20px); }
            75% { border-radius: 40% 60% 33% 67% / 58% 40% 60% 42%; transform: rotate(270deg) scale(1.05) translate(30px, 30px); }
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(360deg) scale(1) translate(0, 0); }
        }

        .floating-card {
            position: absolute;
            width: 60px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: floatCard 15s infinite ease-in-out;
        }

        @keyframes floatCard {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .light-ray {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #2563eb, transparent);
            animation: lightSweep 8s infinite linear;
            opacity: 0.3;
        }

        @keyframes lightSweep {
            0% { transform: translateX(-100%); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        .moving-line {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(37, 99, 235, 0.03) 50px, rgba(37, 99, 235, 0.03) 100px);
            animation: slideLines 20s infinite linear;
        }

        @keyframes slideLines {
            0% { background-position: 0 0; }
            100% { background-position: 200px 200px; }
        }

        /* Dark mode enhancements */
        body.dark-active .mesh-gradient {
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.25), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(139, 92, 246, 0.2), transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(6, 182, 212, 0.15), transparent 50%);
        }

        body.dark-active .fast-particle {
            background: #60a5fa;
            box-shadow: 0 0 4px #60a5fa;
        }

        body.dark-active .glow-orb {
            filter: blur(100px);
        }

        body.dark-active .dance-shape {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.12));
        }

        body.dark-active .light-ray {
            background: linear-gradient(90deg, transparent, #60a5fa, transparent);
            opacity: 0.5;
        }

        body.dark-active .star {
            background: #a78bfa;
            box-shadow: 0 0 4px #a78bfa;
        }

        body.dark-active .moving-line {
            background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(59, 130, 246, 0.08) 50px, rgba(59, 130, 246, 0.08) 100px);
        }

        /* Main content wrapper */
        .content-wrapper {
            position: relative;
            z-index: 1;
        }
        
        .calls-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            position: relative;
            z-index: 2;
        }
        
        .calls-header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .calls-header h2 {
            font-size: 1.5rem;
            margin: 0;
        }
        
        .calls-header p {
            font-size: 0.8rem;
            margin: 5px 0 0;
        }
        
        .call-item {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .call-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 1);
        }
        
        .call-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .call-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .call-info {
            flex: 1;
            min-width: 0;
        }
        
        .call-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .call-details {
            font-size: 0.7rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .call-status {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .call-status.missed {
            color: #dc3545;
        }
        
        .call-status.answered {
            color: #28a745;
        }
        
        .call-status.outgoing {
            color: #0d6efd;
        }
        
        .call-duration {
            font-size: 0.65rem;
            color: #888;
        }
        
        .call-time {
            font-size: 0.65rem;
            color: #999;
            text-align: right;
            flex-shrink: 0;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 20px;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            border-top: 1px solid #e0e0e0;
            z-index: 100;
        }
        
        .nav-item {
            text-align: center;
            color: #999;
            text-decoration: none;
            font-size: 0.65rem;
            flex: 1;
            transition: color 0.2s;
        }
        
        .nav-item i {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 3px;
        }
        
        .nav-item.active {
            color: #2563eb;
        }
        
        .nav-item:hover {
            color: #2563eb;
        }
        
        .back-btn {
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        
        .filter-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
            color: white;
            border-color: transparent;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        .auto-refresh-badge {
            font-size: 0.65rem;
            color: #28a745;
            margin-top: 5px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Dark mode overrides */
        body.dark-active .calls-header,
        body.dark-active .call-item,
        body.dark-active .empty-state,
        body.dark-active .filter-btn {
            background: rgba(30, 41, 59, 0.92);
            color: #e2e8f0;
        }
        
        body.dark-active .call-name {
            color: #f1f5f9;
        }
        
        body.dark-active .call-details {
            color: #94a3b8;
        }
        
        body.dark-active .bottom-nav {
            background: rgba(30, 41, 59, 0.95);
            border-top-color: #334155;
        }
        
        body.dark-active .nav-item {
            color: #64748b;
        }
        
        body.dark-active .nav-item.active {
            color: #60a5fa;
        }
        
        body.dark-active .filter-btn {
            border-color: #334155;
        }
        
        body.dark-active .filter-btn.active {
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
            color: white;
        }
        
        @media (max-width: 480px) {
            .calls-container {
                padding: 0.75rem;
            }
            .call-avatar {
                width: 42px;
                height: 42px;
            }
            .call-name {
                font-size: 0.85rem;
            }
            .filter-btn {
                padding: 4px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<script>
    const currentUser = JSON.parse(localStorage.getItem("user") || "null");
    
    if (!currentUser || !currentUser.id) {
        window.location.href = "login.html";
    }
    
    document.getElementById("profileLink").href = `profile.html?uid=${currentUser.id}`;
    document.getElementById("profileNav").href = `profile.html?uid=${currentUser.id}`;
    
    let allCalls = [];
    let currentFilter = 'all';
    let refreshInterval = null;
    
    async function loadCalls() {
        try {
            const res = await fetch(`${API_URL}/calls/user/${currentUser.id}`);
            allCalls = await res.json();
            renderCalls();
        } catch (e) {
            console.error('Error loading calls:', e);
            document.getElementById('callsList').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-phone-slash fa-3x mb-3"></i>
                    <h4>No call history</h4>
                    <p>Your call logs will appear here</p>
                    <button class="btn btn-primary btn-sm mt-2" onclick="loadCalls()">Refresh</button>
                </div>
            `;
        }
    }
    
    function formatDuration(seconds) {
        if (!seconds || seconds === 0) return '';
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        if (mins > 0) return `${mins} min ${secs} sec`;
        return `${secs} sec`;
    }
    
    function formatTime(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (date >= today) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else if (date >= yesterday) {
            return 'Yesterday';
        } else {
            return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }
    }
    
    function getOtherUser(call) {
        if (String(call.caller_id) === String(currentUser.id)) {
            return {
                id: call.receiver_id,
                name: call.receiver_name || 'Unknown User',
                photo: call.receiver_photo
            };
        } else {
            return {
                id: call.caller_id,
                name: call.caller_name || 'Unknown User',
                photo: call.caller_photo
            };
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function renderCalls() {
        let filtered = allCalls;
        
        if (currentFilter === 'missed') {
            filtered = allCalls.filter(c => c.call_status === 'missed');
        } else if (currentFilter === 'answered') {
            filtered = allCalls.filter(c => c.call_status === 'answered');
        } else if (currentFilter === 'outgoing') {
            filtered = allCalls.filter(c => String(c.caller_id) === String(currentUser.id));
        }
        
        const container = document.getElementById('callsList');
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-phone-slash fa-3x mb-3"></i>
                    <h4>No calls found</h4>
                    <p>${currentFilter !== 'all' ? 'Try a different filter' : 'Start a call to see it here'}</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filtered.map(call => {
            const otherUser = getOtherUser(call);
            const isOutgoing = String(call.caller_id) === String(currentUser.id);
            let statusIcon = '';
            let statusClass = '';
            let statusText = '';
            
            if (call.call_status === 'missed' && !isOutgoing) {
                statusIcon = '<i class="fas fa-phone-slash"></i>';
                statusClass = 'missed';
                statusText = 'Missed';
            } else if (call.call_status === 'answered') {
                statusIcon = '<i class="fas fa-phone-alt"></i>';
                statusClass = 'answered';
                statusText = isOutgoing ? 'Outgoing' : 'Incoming';
            } else if (isOutgoing) {
                statusIcon = '<i class="fas fa-arrow-right"></i>';
                statusClass = 'outgoing';
                statusText = 'Outgoing';
            } else if (call.call_status === 'missed') {
                statusIcon = '<i class="fas fa-phone-slash"></i>';
                statusClass = 'missed';
                statusText = 'Missed';
            } else {
                statusIcon = '<i class="fas fa-phone-alt"></i>';
                statusClass = 'answered';
                statusText = 'Incoming';
            }
            
            const initials = otherUser.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            const callTypeIcon = call.call_type === 'video' ? '<i class="fas fa-video"></i>' : '<i class="fas fa-phone"></i>';
            
            return `
                <div class="call-item" onclick="window.location.href='chat.html?with=${otherUser.id}'">
                    <div class="call-avatar">
                        ${otherUser.photo && otherUser.photo !== 'null' ? 
                            `<img src="${otherUser.photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : 
                            `<span>${initials}</span>`
                        }
                    </div>
                    <div class="call-info">
                        <div class="call-name">${escapeHtml(otherUser.name)}</div>
                        <div class="call-details">
                            <span class="call-status ${statusClass}">
                                ${statusIcon} ${statusText} ${callTypeIcon}
                            </span>
                            ${call.duration > 0 ? `<span class="call-duration"> • ${formatDuration(call.duration)}</span>` : ''}
                        </div>
                    </div>
                    <div class="call-time">
                        ${formatTime(call.started_at)}
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderCalls();
        });
    });
    
    // Auto-refresh every 10 seconds
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            loadCalls();
        }, 10000);
    }
    
    // Socket listener for real-time call updates
    if (typeof io !== 'undefined') {
        const socket = io(SOCKET_URL, { transports: ['websocket', 'polling'] });
        
        socket.on('connect', () => {
            console.log('Socket connected for calls');
            socket.emit('register-user', currentUser.id);
        });
        
        socket.on('call-ended', () => {
            console.log('Call ended, refreshing call history');
            loadCalls();
        });
        
        socket.on('call-accepted', () => {
            console.log('Call accepted, refreshing call history');
            loadCalls();
        });
    }
    
    // Initialize
    loadCalls();
    startAutoRefresh();
    
    // Cleanup interval on page unload
    window.addEventListener('beforeunload', () => {
        if (refreshInterval) clearInterval(refreshInterval);
    });
</script>
</body>
</html>
