<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Verify Email - LaborConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Verify Page Specific Styles */
        
        /* Force body background to match homepage */
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%) !important;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        
        /* Navbar override to match homepage */
        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
            padding: 0.875rem 0 !important;
            position: sticky !important;
            top: 0 !important;
            z-index: 1000 !important;
        }
        
        .navbar .navbar-brand {
            font-weight: 800 !important;
            font-size: 1.5rem !important;
            background: linear-gradient(135deg, #2563eb 0%, #8b5cf6 100%) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            color: transparent !important;
        }
        
        /* Fix navbar toggler visibility for light mode */
        .navbar-toggler {
            border-color: rgba(0, 0, 0, 0.2) !important;
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(0, 0, 0, 0.7)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
        }
        
        .nav-link {
            color: #4b5563 !important;
            font-weight: 500 !important;
            transition: color 0.2s ease !important;
        }
        
        .nav-link:hover {
            color: #2563eb !important;
        }
        
        /* No dark mode button on this page - but responsive to homepage */
        .dark-toggle-btn {
            display: none !important;
        }
        
        /* Verify Container */
        .verify-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }
        
        /* Verify Card */
        .verify-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid #e5e7eb;
            transition: transform 0.3s ease;
        }
        
        .verify-card:hover {
            transform: translateY(-4px);
        }
        
        /* Card Header */
        .verify-header {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        
        .verify-header .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        
        .verify-header .icon-circle i {
            font-size: 2.5rem;
            color: white;
        }
        
        .verify-header h3 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .verify-header p {
            opacity: 0.9;
            font-size: 0.9rem;
            margin: 0;
        }
        
        /* Card Body */
        .verify-body {
            padding: 2rem;
        }
        
        /* Email Display */
        .email-display {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .email-display i {
            color: #10b981;
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }
        
        .email-display span {
            color: #1f2937;
            font-weight: 500;
            word-break: break-all;
        }
        
        /* Code Input */
        .code-input-container {
            margin-bottom: 1.5rem;
        }
        
        .code-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #374151;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .code-input-wrapper {
            position: relative;
        }
        
        .code-input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
            pointer-events: none;
        }
        
        .code-input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-align: center;
            transition: all 0.2s ease;
            background: white;
            color: #1f2937;
        }
        
        .code-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        /* Timer */
        .timer-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .timer-text {
            font-size: 0.85rem;
            color: #6b7280;
        }
        
        .timer-value {
            font-weight: 700;
            color: #2563eb;
            font-size: 1rem;
        }
        
        /* Buttons */
        .btn-verify {
            width: 100%;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        
        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }
        
        .btn-verify:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-resend {
            width: 100%;
            background: transparent;
            color: #2563eb;
            border: 1.5px solid #e5e7eb;
            padding: 0.9rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-resend:hover {
            background: #eff6ff;
            border-color: #2563eb;
            transform: translateY(-2px);
        }
        
        .btn-resend:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Login Link */
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }
        
        .login-link p {
            color: #6b7280;
            font-size: 0.85rem;
            margin: 0;
        }
        
        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        /* Alert Messages */
        .alert-message {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        .alert-success {
            background: #ecfdf5;
            color: #10b981;
            border: 1px solid #a7f3d0;
        }
        
        /* Loading Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner-icon {
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }
        
        /* Dark Mode - Responsive to Homepage */
        body.dark-active {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%) !important;
        }
        
        body.dark-active .navbar {
            background: rgba(15, 23, 42, 0.95) !important;
            border-bottom-color: rgba(255, 255, 255, 0.05) !important;
        }
        
        body.dark-active .navbar-toggler {
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        
        body.dark-active .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 0.8)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
        }
        
        body.dark-active .verify-card {
            background: #1e293b;
            border-color: #334155;
        }
        
        body.dark-active .verify-header {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
        }
        
        body.dark-active .email-display {
            background: #0f172a;
            border-color: #334155;
        }
        
        body.dark-active .email-display span {
            color: #f1f5f9;
        }
        
        body.dark-active .code-input {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
        }
        
        body.dark-active .code-input:focus {
            border-color: #3b82f6;
        }
        
        body.dark-active .code-label {
            color: #cbd5e1;
        }
        
        body.dark-active .timer-text {
            color: #94a3b8;
        }
        
        body.dark-active .btn-resend {
            color: #60a5fa;
            border-color: #334155;
        }
        
        body.dark-active .btn-resend:hover {
            background: rgba(37, 99, 235, 0.2);
            border-color: #3b82f6;
        }
        
        body.dark-active .login-link {
            border-top-color: #334155;
        }
        
        body.dark-active .login-link p {
            color: #94a3b8;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .verify-container {
                padding: 1rem;
            }
            
            .verify-header {
                padding: 1.5rem;
            }
            
            .verify-header h3 {
                font-size: 1.5rem;
            }
            
            .verify-header .icon-circle {
                width: 65px;
                height: 65px;
            }
            
            .verify-header .icon-circle i {
                font-size: 2rem;
            }
            
            .verify-body {
                padding: 1.5rem;
            }
            
            .code-input {
                font-size: 1rem;
                letter-spacing: 2px;
                padding: 0.9rem 1rem 0.9rem 2.5rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">LaborConnect</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

<div class="verify-container">
    <div class="verify-card">
        <div class="verify-header">
            <div class="icon-circle">
                <i class="fas fa-envelope-open-text"></i>
            </div>
            <h3 id="verifyTitle">Verify Your Email</h3>
            <p id="verifySubtitle">Enter the verification code sent to your email</p>
        </div>
        
        <div class="verify-body">
            <!-- Email Display -->
            <div class="email-display">
                <i class="fas fa-envelope"></i>
                <span id="displayEmail">loading...</span>
            </div>
            
            <!-- Alert Message -->
            <div id="alertMessage" class="alert-message"></div>
            
            <!-- Code Input -->
            <div class="code-input-container">
                <label class="code-label" id="codeLabel">Verification Code</label>
                <div class="code-input-wrapper">
                    <i class="fas fa-key code-input-icon"></i>
                    <input type="text" class="code-input" id="code" maxlength="6" placeholder="000000" autocomplete="off">
                </div>

            <!-- Timer -->
            <div class="timer-container">
                <span class="timer-text" id="timerText">Code expires in</span>
                <span class="timer-value" id="timerValue">24:00</span>

            <!-- Verify Button -->
            <button type="button" class="btn-verify" id="verifyBtn">
                <i class="fas fa-check-circle me-2"></i> <span id="verifyBtnText">Verify Account</span>

            <!-- Resend Button -->
            <button type="button" class="btn-resend" id="resendBtn">
                <i class="fas fa-redo-alt me-2"></i> <span id="resendText">Resend Verification Code</span>
            </button>
            
            <!-- Login Link -->
            <div class="login-link">
                <p id="loginText">Already verified? <a href="login.html" id="loginLink">Sign In</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="common.js"></script>
<script>
    // Get email and welcome parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    let userEmail = urlParams.get('email');
    const welcomeType = urlParams.get('welcome');
    const userName = urlParams.get('name');
    
    if (!userEmail) {
        userEmail = sessionStorage.getItem('pendingVerificationEmail');
    }
    
    if (!userEmail) {
        alert('No email found. Please register again.');
        window.location.href = 'register.html';
    }
    
    // Store welcome info for after verification
    if (welcomeType === 'new' && userName) {
        sessionStorage.setItem('pendingWelcomeName', userName);
        sessionStorage.setItem('pendingWelcomeType', 'new');
    }
    
    // Display email (masked for privacy)
    function maskEmail(email) {
        if (!email) return '';
        const [username, domain] = email.split('@');
        if (username.length <= 3) {
            return email;
        }
        const maskedUsername = username.substring(0, 2) + '****' + username.substring(username.length - 1);
        return `${maskedUsername}@${domain}`;
    }
    
    document.getElementById('displayEmail').textContent = maskEmail(userEmail);
    
    // ==================== TRANSLATIONS ====================
    const verifyTranslations = {
        en: {
            verifyTitle: "Verify Your Email",
            verifySubtitle: "Enter the verification code sent to your email",
            codeLabel: "Verification Code",
            timerText: "Code expires in",
            verifyBtnText: "Verify Account",
            resendText: "Resend Verification Code",
            loginText: "Already verified?",
            loginLink: "Sign In",
            successMessage: "Email verified successfully! Redirecting to login...",
            errorMessage: "Invalid or expired code. Please try again.",
            resendSuccess: "New verification code sent to your email!",
            resendError: "Failed to resend code. Please try again.",
            invalidCode: "Please enter the 6-digit verification code"
        },
        ko: {
            verifyTitle: "이메일 인증",
            verifySubtitle: "이메일로 전송된 인증 코드를 입력하세요",
            codeLabel: "인증 코드",
            timerText: "코드 만료까지",
            verifyBtnText: "인증하기",
            resendText: "인증 코드 재전송",
            loginText: "이미 인증하셨나요?",
            loginLink: "로그인",
            successMessage: "이메일이 성공적으로 인증되었습니다! 로그인 페이지로 이동합니다...",
            errorMessage: "유효하지 않거나 만료된 코드입니다. 다시 시도해주세요.",
            resendSuccess: "새 인증 코드가 이메일로 전송되었습니다!",
            resendError: "코드 재전송에 실패했습니다. 다시 시도해주세요.",
            invalidCode: "6자리 인증 코드를 입력해주세요"
        },
        zh: {
            verifyTitle: "验证您的邮箱",
            verifySubtitle: "输入发送到您邮箱的验证码",
            codeLabel: "验证码",
            timerText: "验证码有效期至",
            verifyBtnText: "验证账户",
            resendText: "重新发送验证码",
            loginText: "已经验证过了？",
            loginLink: "登录",
            successMessage: "邮箱验证成功！正在跳转到登录页面...",
            errorMessage: "验证码无效或已过期，请重试。",
            resendSuccess: "新验证码已发送到您的邮箱！",
            resendError: "重新发送验证码失败，请重试。",
            invalidCode: "请输入6位验证码"
        },
        fr: {
            verifyTitle: "Vérifiez votre email",
            verifySubtitle: "Entrez le code de vérification envoyé à votre email",
            codeLabel: "Code de vérification",
            timerText: "Le code expire dans",
            verifyBtnText: "Vérifier le compte",
            resendText: "Renvoyer le code",
            loginText: "Déjà vérifié ?",
            loginLink: "Se connecter",
            successMessage: "Email vérifié avec succès ! Redirection vers la connexion...",
            errorMessage: "Code invalide ou expiré. Veuillez réessayer.",
            resendSuccess: "Nouveau code de vérification envoyé à votre email !",
            resendError: "Échec de l'envoi du code. Veuillez réessayer.",
            invalidCode: "Veuillez entrer le code à 6 chiffres"
        },
        ru: {
            verifyTitle: "Подтвердите email",
            verifySubtitle: "Введите код подтверждения, отправленный на вашу почту",
            codeLabel: "Код подтверждения",
            timerText: "Код действителен",
            verifyBtnText: "Подтвердить",
            resendText: "Отправить код повторно",
            loginText: "Уже подтверждено?",
            loginLink: "Войти",
            successMessage: "Email успешно подтвержден! Перенаправление на вход...",
            errorMessage: "Неверный или просроченный код. Пожалуйста, попробуйте снова.",
            resendSuccess: "Новый код подтверждения отправлен на вашу почту!",
            resendError: "Не удалось отправить код. Пожалуйста, попробуйте снова.",
            invalidCode: "Пожалуйста, введите 6-значный код подтверждения"
        }
    };
    
    let currentLanguage = localStorage.getItem('language') || 'en';
    
    function updateVerifyLanguage() {
        const t = verifyTranslations[currentLanguage] || verifyTranslations.en;
        
        document.getElementById('verifyTitle').textContent = t.verifyTitle;
        document.getElementById('verifySubtitle').textContent = t.verifySubtitle;
        document.getElementById('codeLabel').textContent = t.codeLabel;
        document.getElementById('timerText').textContent = t.timerText;
        document.getElementById('verifyBtnText').textContent = t.verifyBtnText;
        document.getElementById('resendText').textContent = t.resendText;
        document.getElementById('loginText').innerHTML = `${t.loginText} <a href="login.html" id="loginLink">${t.loginLink}</a>`;
        
        window.verifyTrans = t;
    }
    
    // Listen for language changes from homepage
    window.addEventListener('storage', function(e) {
        if (e.key === 'language') {
            currentLanguage = e.newValue || 'en';
            updateVerifyLanguage();
        }
    });
    
    function checkLanguageChange() {
        const newLang = localStorage.getItem('language') || 'en';
        if (newLang !== currentLanguage) {
            currentLanguage = newLang;
            updateVerifyLanguage();
        }
    }
    setInterval(checkLanguageChange, 500);
    
    // ==================== DARK MODE - RESPONSIVE TO HOMEPAGE ====================
    const DARK_MODE_KEY = 'laborconnect-dark-mode';
    
    function applyDarkMode() {
        const isDarkActive = localStorage.getItem(DARK_MODE_KEY) === 'true';
        if (isDarkActive) {
            document.body.classList.add('dark-active');
        } else {
            document.body.classList.remove('dark-active');
        }
    }
    
    window.addEventListener('storage', function(e) {
        if (e.key === DARK_MODE_KEY) {
            applyDarkMode();
        }
    });
    
    function checkDarkModeChange() {
        const isDarkActive = localStorage.getItem(DARK_MODE_KEY) === 'true';
        if (isDarkActive && !document.body.classList.contains('dark-active')) {
            document.body.classList.add('dark-active');
        } else if (!isDarkActive && document.body.classList.contains('dark-active')) {
            document.body.classList.remove('dark-active');
        }
    }
    setInterval(checkDarkModeChange, 500);
    
    applyDarkMode();
    
    // ==================== TIMER FUNCTION ====================
    let timerInterval;
    let timeLeft = 24 * 60; // 24 minutes in seconds
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timerValue').textContent = '00:00';
                document.getElementById('timerValue').style.color = '#dc2626';
            } else {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timerValue').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }
    
    function resetTimer() {
        timeLeft = 24 * 60;
        document.getElementById('timerValue').style.color = '';
        startTimer();
    }
    
    startTimer();
    
    // ==================== SHOW ALERT FUNCTION ====================
    function showAlert(message, type) {
        const alertDiv = document.getElementById('alertMessage');
        const t = window.verifyTrans || verifyTranslations.en;
        
        alertDiv.textContent = message || (type === 'success' ? t.successMessage : t.errorMessage);
        alertDiv.className = `alert-message alert-${type}`;
        alertDiv.style.display = 'block';
        
        setTimeout(() => {
            alertDiv.style.display = 'none';
        }, 5000);
    }
    
    // ==================== VERIFY CODE ====================
    async function verifyCode() {
        const code = document.getElementById('code').value.trim();
        const t = window.verifyTrans || verifyTranslations.en;
        const verifyBtn = document.getElementById('verifyBtn');
        const originalText = verifyBtn.innerHTML;
        
        if (!code || code.length !== 6) {
            showAlert(t.invalidCode, 'error');
            return;
        }
        
        // Show loading state
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<i class="fas fa-spinner spinner-icon"></i> Verifying...';
        
        try {
            const response = await fetch(`${API_URL}/verify-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail, code })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                showAlert(t.successMessage, 'success');
                sessionStorage.removeItem('pendingVerificationEmail');
                
                // Get stored welcome info
                const pendingName = sessionStorage.getItem('pendingWelcomeName');
                const pendingType = sessionStorage.getItem('pendingWelcomeType');
                let redirectUrl = 'login.html';
                
                if (pendingName && pendingType === 'new') {
                    redirectUrl = `login.html?welcome=new&name=${encodeURIComponent(pendingName)}`;
                    sessionStorage.removeItem('pendingWelcomeName');
                    sessionStorage.removeItem('pendingWelcomeType');
                }
                
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 2000);
            } else {
                showAlert(data.message || t.errorMessage, 'error');
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = originalText;
            }
        } catch (error) {
            console.error('Verification error:', error);
            showAlert(t.errorMessage, 'error');
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = originalText;
        }
    }
    
    // ==================== RESEND CODE ====================
    async function resendCode() {
        const t = window.verifyTrans || verifyTranslations.en;
        const resendBtn = document.getElementById('resendBtn');
        const originalText = resendBtn.innerHTML;
        
        // Disable button during resend
        resendBtn.disabled = true;
        resendBtn.innerHTML = '<i class="fas fa-spinner spinner-icon"></i> Sending...';
        
        try {
            const response = await fetch(`${API_URL}/resend-verification`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showAlert(t.resendSuccess, 'success');
                resetTimer();
                document.getElementById('code').value = '';
                document.getElementById('code').focus();
            } else {
                showAlert(data.message || t.resendError, 'error');
            }
        } catch (error) {
            console.error('Resend error:', error);
            showAlert(t.resendError, 'error');
        } finally {
            resendBtn.disabled = false;
            resendBtn.innerHTML = originalText;
            
            // Re-enable after 30 seconds cooldown
            setTimeout(() => {
                if (resendBtn.disabled === false) {
                    // Keep enabled, just visual feedback
                }
            }, 30000);
        }
    }
    
    // ==================== AUTO-SUBMIT ON 6 DIGITS ====================
    document.getElementById('code').addEventListener('input', function(e) {
        const value = e.target.value.replace(/\D/g, '');
        if (value.length <= 6) {
            e.target.value = value;
        }
        if (value.length === 6) {
            verifyCode();
        }
    });
    
    // ==================== EVENT LISTENERS ====================
    document.getElementById('verifyBtn').addEventListener('click', verifyCode);
    document.getElementById('resendBtn').addEventListener('click', resendCode);
    
    // Enter key support
    document.getElementById('code').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            verifyCode();
        }
    });
    
    // ==================== INITIALIZE ====================
    updateVerifyLanguage();
    
    // Focus on code input
    setTimeout(() => {
        document.getElementById('code').focus();
    }, 500);
</script>
</body>
</html>
