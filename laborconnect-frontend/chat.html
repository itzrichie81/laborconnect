<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat - LaborConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ===== CHAT PAGE OPTIMIZED STYLES - NO EXTRA SPACE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Navbar hidden on chat page */
        .chat-page .navbar {
            display: none !important;
        }

        /* Main Chat Container - Full height */
        .chat-container {
            max-width: 1000px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.05);
        }

        /* Chat Header - Compact */
        .chat-header {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .chat-header .btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .chat-header .btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .chat-avatar:hover {
            transform: scale(1.05);
        }

        .chat-avatar i {
            font-size: 22px;
            color: white;
        }

        .chat-user-info {
            flex: 1;
            cursor: pointer;
        }

        .chat-user-name {
            font-size: 1rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
        }

        .chat-user-status {
            font-size: 0.7rem;
            opacity: 0.9;
            margin: 0;
        }

        .chat-user-status.online {
            color: #90ff90;
        }

        .chat-actions {
            display: flex;
            gap: 0.5rem;
        }

        .chat-actions .btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Chat Messages - Compact & No Extra Space */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        /* Individual Message - Minimal Margin */
        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 0.25rem;
            position: relative;
        }

        .message:last-child {
            margin-bottom: 0;
        }

        .message.sent {
            align-items: flex-end;
        }

        .message.received {
            align-items: flex-start;
        }

        /* Message Bubble - Compact */
        .message-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-break: break-word;
            position: relative;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: white;
            color: #1f2937;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* Message Time */
        .message-time {
            font-size: 0.6rem;
            color: #9ca3af;
            margin-top: 2px;
            margin-left: 8px;
            margin-right: 8px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        /* Voice Message - Compact */
        .voice-card {
            background: rgba(37, 99, 235, 0.1);
            border-radius: 16px;
            padding: 6px 12px;
            min-width: 200px;
        }

        .voice-player {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .voice-play-btn {
            background: #2563eb;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .voice-wave {
            flex: 1;
            height: 32px;
            background: linear-gradient(90deg, #dbeafe 0%, #fff 100%);
            border-radius: 16px;
        }

        /* Media Message - Compact */
        .media-card img,
        .media-card video {
            max-width: 250px;
            max-height: 200px;
            border-radius: 12px;
        }

        /* Call Notification - Compact */
        .call-notification {
            background: rgba(37, 99, 235, 0.08);
            border-radius: 16px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .call-notification:hover {
            background: rgba(37, 99, 235, 0.15);
        }

        .call-notification.missed {
            background: rgba(239, 68, 68, 0.08);
        }

        .call-notification i {
            font-size: 18px;
            width: 28px;
            text-align: center;
        }

        .call-notification .call-info {
            flex: 1;
        }

        .call-notification .call-title {
            font-size: 0.8rem;
            font-weight: 500;
            margin: 0;
        }

        .call-notification .call-subtitle {
            font-size: 0.65rem;
            color: #6b7280;
            margin: 0;
        }

        /* Chat Input - Compact */
        .chat-input {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: white;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .input-with-icons {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            flex: 1;
            background: #f3f4f6;
            border-radius: 30px;
            padding: 0.35rem 0.6rem;
        }

        .input-with-icons .icon-btn {
            background: transparent;
            border: none;
            color: #6b7280;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-with-icons .icon-btn:hover {
            background: #e5e7eb;
            color: #2563eb;
        }

        .input-with-icons input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            padding: 0.5rem 0;
            font-size: 0.9rem;
        }

        .btn-send {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send:hover {
            transform: scale(1.05);
        }

        /* Reply Preview - Compact */
        .reply-preview-panel {
            padding: 6px 12px;
            border-left: 3px solid #2563eb;
            background: rgba(37, 99, 235, 0.08);
            margin: 0 1rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: #1f2937;
            border-radius: 12px;
            overflow: hidden;
            z-index: 10001;
            min-width: 160px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .context-menu-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: white;
            font-size: 0.85rem;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .context-menu-item:last-child {
            border-bottom: none;
        }

        .context-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .context-menu-item.danger {
            color: #f87171;
        }

        /* Selection Mode */
        .selection-mode .message-checkbox {
            display: block;
        }

        .message-checkbox {
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            cursor: pointer;
            display: none;
        }

        .selection-mode .message {
            margin-left: 25px;
        }

        .message.selected .message-bubble {
            outline: 2px solid #2563eb;
        }

        /* Selection Toolbar */
        .selection-toolbar {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            z-index: 10001;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .selection-toolbar button {
            background: none;
            border: none;
            color: white;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .selection-toolbar button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .selection-toolbar .delete-selected {
            color: #f87171;
        }

        /* Connection Status */
        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 1000;
        }

        .connection-status.connected {
            background: #10b981;
            color: white;
        }

        .connection-status.disconnected {
            background: #ef4444;
            color: white;
        }

        .connection-status.connecting {
            background: #f59e0b;
            color: #1f2937;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-media {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Dark Mode */
        body.dark-active .chat-container {
            background: #1e293b;
        }

        body.dark-active .chat-messages {
            background: #0f172a;
        }

        body.dark-active .message.received .message-bubble {
            background: #1e293b;
            color: #f1f5f9;
        }

        body.dark-active .chat-input {
            background: #1e293b;
            border-top-color: #334155;
        }

        body.dark-active .input-with-icons {
            background: #334155;
        }

        body.dark-active .input-with-icons input {
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            
            .message-bubble {
                max-width: 85%;
                padding: 8px 10px;
                font-size: 0.8rem;
            }
            
            .chat-messages {
                padding: 0.75rem;
                gap: 0.2rem;
            }
            
            .chat-input {
                padding: 0.6rem 0.75rem;
            }
            
            .input-with-icons .icon-btn {
                width: 28px;
                height: 28px;
            }
            
            .btn-send {
                width: 36px;
                height: 36px;
            }
            
            .voice-card {
                min-width: 160px;
            }
            
            .media-card img,
            .media-card video {
                max-width: 200px;
                max-height: 160px;
            }
        }
    </style>
</head>
<body class="chat-page">

<div class="chat-container">
    <!-- Chat Header -->
    <div class="chat-header">
        <button class="btn" onclick="exitSelectionMode(); history.back();">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="chat-avatar" id="chatAvatar">
            <i class="fas fa-user-circle"></i>
        </div>
        <div class="chat-user-info" id="chatUserInfo">
            <h5 class="chat-user-name" id="chatTitle">Loading...</h5>
            <p class="chat-user-status" id="chatStatus">
                <i class="fas fa-circle" style="font-size: 6px;"></i> Connecting...
            </p>
        </div>
        <div class="chat-actions">
            <button class="btn" id="selectModeBtn" title="Select messages">
                <i class="fas fa-check-square"></i>
            </button>
            <button class="btn" id="audioCallBtn" title="Start audio call">
                <i class="fas fa-phone"></i>
            </button>
            <button class="btn" id="videoCallBtn" title="Start video call">
                <i class="fas fa-video"></i>
            </button>
        </div>
    </div>

    <!-- Chat Messages Area -->
    <div id="chatMessages" class="chat-messages"></div>

    <!-- Chat Input Area -->
    <div class="chat-input">
        <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none">
        <input type="file" id="cameraInput" accept="image/*" capture style="display:none">
        <div class="input-with-icons">
            <button class="icon-btn" id="attachBtn" title="Attach media">
                <i class="fas fa-paperclip"></i>
            </button>
            <button class="icon-btn" id="cameraBtn" title="Camera">
                <i class="fas fa-camera"></i>
            </button>
            <button class="icon-btn" id="recordToggle" title="Record voice">
                <i class="fas fa-microphone"></i>
            </button>
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
        </div>
        <button class="btn-send" id="sendButton">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<!-- Selection Toolbar -->
<div id="selectionToolbar" class="selection-toolbar" style="display: none;">
    <button id="selectAllBtn"><i class="fas fa-check-double"></i> All</button>
    <span id="selectionCount">0 selected</span>
    <button id="deleteSelectedBtn" class="delete-selected"><i class="fas fa-trash"></i> Delete</button>
    <button id="closeSelectionBtn"><i class="fas fa-times"></i> Cancel</button>
</div>

<!-- Connection Status -->
<div class="connection-status connecting" id="connectionStatus">
    <i class="fas fa-spinner fa-spin"></i> Connecting...
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
    <span class="lightbox-close" onclick="closeLightbox(event)">&times;</span>
    <img id="lightbox-img" class="lightbox-media">
    <video id="lightbox-video" class="lightbox-media" controls></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="common.js"></script>
<script>
    // ==================== CONFIGURATION ====================
    //const API_URL = (location.port && location.port === '5000') ? `${location.origin}/api` : 'http://localhost:5000/api';
    //const SOCKET_URL = (location.port && location.port === '5000') ? `${location.origin}` : 'http://localhost:5000';
    
    const socket = io(SOCKET_URL, { transports: ['websocket', 'polling'], reconnection: true });
    
    const urlParams = new URLSearchParams(location.search);
    const otherUserId = urlParams.get('with');
    const currentUser = JSON.parse(localStorage.getItem('user') || 'null');
    const chatId = `${Math.min(currentUser?.id, otherUserId)}-${Math.max(currentUser?.id, otherUserId)}`;
    
    // Check authentication
    if (!currentUser || !currentUser.id || !otherUserId) {
        window.location.href = 'login.html';
    }
    
    // DOM Elements
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const chatStatus = document.getElementById('chatStatus');
    const chatTitle = document.getElementById('chatTitle');
    const chatAvatar = document.getElementById('chatAvatar');
    const chatUserInfo = document.getElementById('chatUserInfo');
    const selectModeBtn = document.getElementById('selectModeBtn');
    const selectionToolbar = document.getElementById('selectionToolbar');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const closeSelectionBtn = document.getElementById('closeSelectionBtn');
    const selectionCountSpan = document.getElementById('selectionCount');

    // State variables
    let messages = [];
    let replyToMessage = null;
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let otherUserName = '';
    let otherUserPhoto = null;
    let isSelectionMode = false;
    let selectedMessages = new Set();
    let contextMenu = null;
    let localStream = null;

    // Socket events
    socket.emit('register-user', currentUser.id);
    window.currentChatId = chatId;

    // ==================== HELPER FUNCTIONS ====================
    function scrollChatToBottom() {
        if (!chatMessages) return;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function formatTime(dateString) {
        if (!dateString) return '';
        const date = new Date(dateString);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        
        if (date >= today) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else {
            return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }
    }

    function formatDuration(seconds) {
        if (!seconds || seconds === 0) return '';
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        if (mins > 0) return `${mins}:${secs.toString().padStart(2, '0')}`;
        return `0:${secs.toString().padStart(2, '0')}`;
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // ==================== CHAT USER INFO ====================
    async function loadChatUser() {
        try {
            const res = await fetch(`${API_URL}/user/${otherUserId}`);
            const user = await res.json();
            if (user && user.name) {
                otherUserName = user.name;
                otherUserPhoto = user.photourl || user.photoURL;
                chatTitle.innerHTML = user.name;
                
                if (otherUserPhoto && otherUserPhoto !== 'null') {
                    chatAvatar.innerHTML = `<img src="${otherUserPhoto}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                } else {
                    const initials = user.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    chatAvatar.innerHTML = `<div style="width:100%;height:100%;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px;">${initials}</div>`;
                }
                chatStatus.innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #90ff90;"></i> Online';
                chatStatus.classList.add('online');
            }
        } catch (e) {
            console.error('Failed to load user:', e);
            otherUserName = `User ${otherUserId}`;
            chatTitle.textContent = `User ${otherUserId}`;
        }
    }

    // ==================== LOAD MESSAGES ====================
    async function loadMessages() {
        try {
            const res = await fetch(`${API_URL}/messages/${chatId}?userId=${currentUser.id}`);
            messages = await res.json();
            renderMessages();
        } catch (e) {
            console.error('Unable to load messages', e);
        }
    }

    // ==================== RENDER MESSAGES - COMPACT VERSION ====================
    function renderMessages() {
        const visibleMessages = messages.filter(msg => {
            const deletedFor = msg.deleted_for || '';
            const deletedList = deletedFor.split(',');
            return !deletedList.includes(String(currentUser.id));
        });
        
        chatMessages.innerHTML = '';
        
        visibleMessages.forEach((msg, idx) => {
            const messageRow = document.createElement('div');
            const isSent = String(msg.fromuser || msg.fromUser || msg.from) === String(currentUser.id);
            messageRow.className = `message ${isSent ? 'sent' : 'received'}`;
            messageRow.setAttribute('data-message-id', msg.id);
            
            let content = '';
            const replyId = msg.replyTo || msg.replyto;
            
            if (replyId) {
                const replied = messages.find(m => String(m.id) === String(replyId));
                if (replied) {
                    const previewText = replied.type === 'voice' ? 'Voice note' : (replied.text || '').substring(0, 50);
                    content += `<div class="reply-preview" style="font-size:0.7rem; opacity:0.7; margin-bottom:4px;">↳ Replying to: ${escapeHtml(previewText)}</div>`;
                }
            }
            
            // Message content based on type
            if (msg.type === 'voice') {
                content += `<div class="message-bubble voice-card">
                    <div class="voice-player">
                        <button class="voice-play-btn" onclick="toggleVoicePlayback(this)"><i class="fas fa-play"></i></button>
                        <div class="voice-wave"></div>
                        <audio src="${msg.payload || ''}" preload="metadata" style="display:none;"></audio>
                    </div>
                </div>`;
            } 
            else if (msg.type === 'media') {
                const mediaUrl = msg.payload || '';
                const isImage = /\.(png|jpg|jpeg|gif|bmp|webp)$/i.test(mediaUrl);
                content += `<div class="message-bubble media-card">
                    ${isImage ? 
                        `<img src="${mediaUrl}" alt="Media" onclick="openLightbox('${mediaUrl}', 'image')" style="max-width:200px; border-radius:12px; cursor:pointer;">` : 
                        `<video src="${mediaUrl}" controls style="max-width:200px; border-radius:12px;" preload="metadata"></video>`
                    }
                </div>`;
            } 
            else if (msg.type === 'call') {
                try {
                    const callData = typeof msg.payload === 'string' ? JSON.parse(msg.payload) : msg.payload;
                    const isMissed = callData.call_status === 'missed' && String(callData.caller_id) !== String(currentUser.id);
                    const callTypeIcon = callData.call_type === 'video' ? '<i class="fas fa-video"></i>' : '<i class="fas fa-phone"></i>';
                    const duration = callData.duration || 0;
                    const durationText = duration > 0 ? formatDuration(duration) : '';
                    
                    let statusText = '';
                    if (callData.call_status === 'missed') statusText = 'Missed call';
                    else if (callData.call_status === 'ended') statusText = `Call ended ${durationText ? '(' + durationText + ')' : ''}`;
                    else statusText = isSent ? 'Outgoing call' : 'Incoming call';
                    
                    content += `<div class="message-bubble call-notification ${isMissed ? 'missed' : ''}" onclick="window.location.href='chat.html?with=${callData.caller_id == currentUser.id ? callData.receiver_id : callData.caller_id}'">
                        ${callTypeIcon}
                        <div class="call-info">
                            <div class="call-title">${statusText}</div>
                            <div class="call-subtitle">${formatTime(callData.started_at)}</div>
                        </div>
                        <i class="fas fa-chevron-right" style="font-size:12px;"></i>
                    </div>`;
                } catch(e) {
                    content += `<div class="message-bubble">Call notification</div>`;
                }
            } 
            else {
                content += `<div class="message-bubble">${escapeHtml(msg.text || '')}</div>`;
            }
            
            content += `<div class="message-time">${formatTime(msg.time)}</div>`;
            messageRow.innerHTML = content;
            
            // Context menu events
            messageRow.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                removeContextMenu();
                showContextMenu(msg.id, e.clientX, e.clientY, isSent);
                return false;
            });
            
            // Long press for mobile
            let pressTimer;
            messageRow.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    const touch = e.touches[0];
                    showContextMenu(msg.id, touch.clientX, touch.clientY, isSent);
                }, 500);
            });
            messageRow.addEventListener('touchend', () => clearTimeout(pressTimer));
            messageRow.addEventListener('touchmove', () => clearTimeout(pressTimer));
            
            chatMessages.appendChild(messageRow);
        });
        
        scrollChatToBottom();
        
        // Update selection mode checkboxes if active
        if (isSelectionMode) {
            document.querySelectorAll('.message').forEach(msg => {
                if (!msg.querySelector('.message-checkbox')) {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'message-checkbox';
                    checkbox.setAttribute('data-msg-id', msg.getAttribute('data-message-id'));
                    checkbox.addEventListener('change', function(e) {
                        e.stopPropagation();
                        const msgId = this.getAttribute('data-msg-id');
                        if (this.checked) {
                            selectedMessages.add(msgId);
                            msg.classList.add('selected');
                        } else {
                            selectedMessages.delete(msgId);
                            msg.classList.remove('selected');
                        }
                        updateSelectionUI();
                    });
                    msg.insertBefore(checkbox, msg.firstChild);
                }
            });
        }
    }

    // ==================== SEND MESSAGE ====================
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        const payload = {
            chatId,
            from: currentUser.id,
            to: otherUserId,
            text,
            type: 'text',
            payload: null,
            replyTo: replyToMessage?.id || null
        };
        
        socket.emit('send-message', payload);
        replyToMessage = null;
        updateReplyPreview();
        messageInput.value = '';
    }

    // ==================== UPLOAD FILE ====================
    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        const response = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
        const json = await response.json();
        return json.url;
    }

    async function uploadAndSendMedia(file) {
        const url = await uploadFile(file);
        const payload = {
            chatId,
            from: currentUser.id,
            to: otherUserId,
            text: file.name,
            type: 'media',
            payload: url,
            replyTo: replyToMessage?.id || null
        };
        socket.emit('send-message', payload);
        replyToMessage = null;
        updateReplyPreview();
    }

    // ==================== VOICE RECORDING ====================
    async function toggleRecord() {
        if (isRecording) {
            mediaRecorder.stop();
            if (recordToggle) recordToggle.innerHTML = '<i class="fas fa-microphone"></i>';
            isRecording = false;
            return;
        }
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('Audio recording is not supported in this browser.');
            return;
        }
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(localStream);
            recordedChunks = [];
            
            mediaRecorder.addEventListener('dataavailable', event => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            });
            
            mediaRecorder.addEventListener('stop', async () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                try {
                    const url = await uploadFile(new File([blob], 'voice-note.webm', { type: 'audio/webm' }));
                    const payload = {
                        chatId,
                        from: currentUser.id,
                        to: otherUserId,
                        text: 'Voice note',
                        type: 'voice',
                        payload: url,
                        replyTo: replyToMessage?.id || null
                    };
                    socket.emit('send-message', payload);
                    replyToMessage = null;
                    updateReplyPreview();
                } catch (uploadError) {
                    console.error('Voice upload failed', uploadError);
                    alert('Voice upload failed. Please try again.');
                }
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            });
            
            mediaRecorder.start();
            isRecording = true;
            const recordToggle = document.getElementById('recordToggle');
            if (recordToggle) recordToggle.innerHTML = '<i class="fas fa-stop"></i>';
        } catch (err) {
            console.error('Recording failed', err);
            alert('Unable to start voice recording.');
        }
    }

    // ==================== DELETE MESSAGE ====================
    function deleteMessage(messageId, deleteForEveryone) {
        socket.emit('delete-message', {
            chatId,
            id: messageId,
            userId: currentUser.id,
            deleteForEveryone: deleteForEveryone || false
        });
    }

    // ==================== CONTEXT MENU ====================
    function removeContextMenu() {
        if (contextMenu) {
            contextMenu.remove();
            contextMenu = null;
        }
    }

    function showContextMenu(messageId, x, y, isSent) {
        removeContextMenu();
        
        const message = messages.find(m => String(m.id) === String(messageId));
        if (!message) return;
        
        const ageInMinutes = (new Date() - new Date(message.time)) / (1000 * 60);
        const isNewMessage = ageInMinutes <= 60;
        
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        
        let menuHtml = `
            <div class="context-menu-item" data-action="reply"><i class="fas fa-reply"></i> Reply</div>
            <div class="context-menu-item" data-action="select"><i class="fas fa-check-square"></i> Select</div>
        `;
        
        if (message.type === 'text') {
            menuHtml += `<div class="context-menu-item" data-action="copy"><i class="fas fa-copy"></i> Copy</div>`;
        }
        
        if (String(message.from) === String(currentUser.id)) {
            if (message.type === 'text' && ageInMinutes <= 30) {
                menuHtml += `<div class="context-menu-item" data-action="edit"><i class="fas fa-pen"></i> Edit</div>`;
            }
            menuHtml += `<div class="context-menu-divider"></div>
                        <div class="context-menu-item danger" data-action="delete">
                            <i class="fas fa-trash"></i> ${isNewMessage ? 'Unsend for Everyone' : 'Delete for Me'}
                        </div>`;
        } else {
            menuHtml += `<div class="context-menu-divider"></div>
                        <div class="context-menu-item danger" data-action="delete-for-me">
                            <i class="fas fa-trash"></i> Delete for Me
                        </div>
                        <div class="context-menu-item" data-action="report">
                            <i class="fas fa-flag"></i> Report
                        </div>`;
        }
        
        menu.innerHTML = menuHtml;
        document.body.appendChild(menu);
        contextMenu = menu;
        
        menu.querySelectorAll('.context-menu-item').forEach(item => {
            item.addEventListener('click', async () => {
                const action = item.dataset.action;
                switch(action) {
                    case 'reply': replyMessage(messageId); break;
                    case 'select':
                        enterSelectionMode();
                        const cb = document.querySelector(`.message[data-message-id="${messageId}"] .message-checkbox`);
                        if (cb) { cb.checked = true; cb.dispatchEvent(new Event('change')); }
                        break;
                    case 'copy': await navigator.clipboard.writeText(message.text); alert('Message copied'); break;
                    case 'edit': editMessage(messageId); break;
                    case 'delete':
                        const unsend = (new Date() - new Date(message.time)) / (1000 * 60) <= 60;
                        if (confirm(unsend ? 'Unsend for everyone?' : 'Delete for you?')) deleteMessage(messageId, unsend);
                        break;
                    case 'delete-for-me':
                        if (confirm('Delete this message for you?')) deleteMessage(messageId, false);
                        break;
                    case 'report': alert('Message reported to admin.'); break;
                }
                removeContextMenu();
            });
        });
        
        setTimeout(() => {
            const closeMenu = (e) => {
                if (!menu.contains(e.target)) {
                    removeContextMenu();
                    document.removeEventListener('click', closeMenu);
                    document.removeEventListener('touchstart', closeMenu);
                }
            };
            document.addEventListener('click', closeMenu);
            document.addEventListener('touchstart', closeMenu);
        }, 50);
    }

    function replyMessage(messageId) {
        replyToMessage = messages.find(m => String(m.id) === String(messageId)) || null;
        updateReplyPreview();
        messageInput.focus();
    }

    function editMessage(messageId) {
        const message = messages.find(m => String(m.id) === String(messageId));
        if (!message || message.type !== 'text') return;
        const updated = prompt('Edit message', message.text);
        if (!updated || !updated.trim()) return;
        socket.emit('edit-message', { chatId, id: messageId, text: updated.trim(), payload: null });
    }

    function updateReplyPreview() {
        let preview = document.querySelector('.reply-preview-panel');
        if (!preview && replyToMessage) {
            preview = document.createElement('div');
            preview.className = 'reply-preview-panel';
            document.querySelector('.chat-input')?.before(preview);
        }
        if (replyToMessage && preview) {
            const previewText = replyToMessage.type === 'voice' ? 'Voice note' : escapeHtml(replyToMessage.text || '').substring(0, 50);
            preview.innerHTML = `<strong>Replying to:</strong> ${previewText} 
                <button type="button" style="float:right; background:none; border:none; color:#2563eb;" onclick="cancelReply()">Cancel</button>`;
            preview.style.display = 'block';
        } else if (preview) {
            preview.style.display = 'none';
        }
    }

    window.cancelReply = function() {
        replyToMessage = null;
        updateReplyPreview();
    };

    window.toggleVoicePlayback = function(button) {
        const audio = button.parentElement.querySelector('audio');
        if (!audio) return;
        if (audio.paused) {
            audio.play();
            button.innerHTML = '<i class="fas fa-pause"></i>';
            audio.onended = () => button.innerHTML = '<i class="fas fa-play"></i>';
        } else {
            audio.pause();
            button.innerHTML = '<i class="fas fa-play"></i>';
        }
    };

    // ==================== SELECTION MODE ====================
    function enterSelectionMode() {
        isSelectionMode = true;
        document.body.classList.add('selection-mode');
        selectionToolbar.style.display = 'flex';
        updateSelectionUI();
    }

    function exitSelectionMode() {
        isSelectionMode = false;
        selectedMessages.clear();
        document.body.classList.remove('selection-mode');
        selectionToolbar.style.display = 'none';
        document.querySelectorAll('.message-checkbox').forEach(cb => cb.remove());
        document.querySelectorAll('.message').forEach(msg => msg.classList.remove('selected'));
    }

    function updateSelectionUI() {
        selectionCountSpan.textContent = `${selectedMessages.size} selected`;
    }

    // ==================== LIGHTBOX ====================
    function openLightbox(src, type) {
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        const vid = document.getElementById('lightbox-video');
        img.style.display = 'none';
        vid.style.display = 'none';
        if (type === 'image') {
            img.src = src;
            img.style.display = 'block';
        } else {
            vid.src = src;
            vid.style.display = 'block';
        }
        lb.classList.add('active');
    }

    function closeLightbox(e) {
        if (e && e.target !== e.currentTarget && e.target.classList?.contains('lightbox-close') === false) return;
        const lb = document.getElementById('lightbox');
        const vid = document.getElementById('lightbox-video');
        if (vid) vid.pause();
        lb.classList.remove('active');
    }

    // ==================== SOCKET EVENTS ====================
    socket.on('connect', () => {
        updateConnectionStatus('connected', 'Connected');
        chatStatus.innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #90ff90;"></i> Online';
        socket.emit('join-chat', chatId);
        socket.emit('register-user', currentUser.id);
    });

    socket.on('disconnect', () => {
        updateConnectionStatus('disconnected', 'Disconnected');
        chatStatus.innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #ffaaaa;"></i> Offline';
    });

    socket.on('new-message', (msg) => {
        if (msg.chatId !== chatId) return;
        messages.push(msg);
        renderMessages();
    });

    socket.on('message-updated', (payload) => {
        if (payload.chatId !== chatId) return;
        const idx = messages.findIndex(m => String(m.id) === String(payload.id));
        if (idx !== -1) {
            messages[idx] = { ...messages[idx], text: payload.text };
            renderMessages();
        }
    });

    socket.on('message-deleted-for-user', (payload) => {
        if (payload.userId == currentUser.id) {
            messages = messages.filter(msg => String(msg.id) !== String(payload.id));
            renderMessages();
            if (isSelectionMode) exitSelectionMode();
        }
    });

    socket.on('message-deleted-for-everyone', (payload) => {
        if (payload.chatId !== chatId) return;
        messages = messages.filter(msg => String(msg.id) !== String(payload.id));
        renderMessages();
        if (isSelectionMode) exitSelectionMode();
    });

    function updateConnectionStatus(status, text) {
        const statusDiv = document.getElementById('connectionStatus');
        if (statusDiv) {
            statusDiv.className = `connection-status ${status}`;
            statusDiv.innerHTML = status === 'connected' ? '<i class="fas fa-check-circle"></i> ' + text : 
                                  status === 'connecting' ? '<i class="fas fa-spinner fa-spin"></i> ' + text : 
                                  '<i class="fas fa-exclamation-triangle"></i> ' + text;
            if (status === 'connected') {
                setTimeout(() => { statusDiv.style.opacity = '0'; setTimeout(() => statusDiv.style.display = 'none', 1000); }, 3000);
            } else {
                statusDiv.style.display = 'flex';
                statusDiv.style.opacity = '1';
            }
        }
    }

    // ==================== EVENT LISTENERS ====================
    document.getElementById('attachBtn')?.addEventListener('click', () => document.getElementById('mediaInput').click());
    document.getElementById('cameraBtn')?.addEventListener('click', () => document.getElementById('cameraInput').click());
    document.getElementById('recordToggle')?.addEventListener('click', toggleRecord);
    document.getElementById('sendButton')?.addEventListener('click', sendMessage);
    document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    document.getElementById('mediaInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) await uploadAndSendMedia(file);
        e.target.value = '';
    });
    
    document.getElementById('cameraInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) await uploadAndSendMedia(file);
        e.target.value = '';
    });

    chatUserInfo?.addEventListener('click', () => window.location.href = `profile.html?uid=${otherUserId}`);

    // Selection mode buttons
    selectModeBtn?.addEventListener('click', enterSelectionMode);
    selectAllBtn?.addEventListener('click', () => {
        document.querySelectorAll('.message').forEach(el => {
            const msgId = el.getAttribute('data-message-id');
            if (msgId) { selectedMessages.add(msgId); el.classList.add('selected'); }
        });
        updateSelectionUI();
    });
    deleteSelectedBtn?.addEventListener('click', () => {
        if (selectedMessages.size === 0) return;
        if (confirm(`Delete ${selectedMessages.size} selected message(s)?`)) {
            selectedMessages.forEach(msgId => {
                const msg = messages.find(m => String(m.id) === String(msgId));
                if (msg) {
                    const msgAge = (new Date() - new Date(msg.time)) / (1000 * 60);
                    const isOwnMessage = String(msg.from) === String(currentUser.id);
                    const unsend = isOwnMessage && msgAge <= 60;
                    deleteMessage(msgId, unsend);
                }
            });
            exitSelectionMode();
        }
    });
    closeSelectionBtn?.addEventListener('click', exitSelectionMode);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeLightbox();
            if (isSelectionMode) exitSelectionMode();
            removeContextMenu();
        }
    });

    // Initialize
    loadChatUser();
    loadMessages();
</script>
</body>
</html>
