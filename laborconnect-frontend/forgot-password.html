<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset Password - LaborConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Mobile-specific styles */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }
        
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        
        .reset-card {
            background: white;
            border-radius: 24px;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin: auto;
        }
        
        .reset-icon {
            background: #0d6efd;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        
        .reset-icon i {
            font-size: 32px;
            color: white;
        }
        
        .form-control-lg {
            padding: 14px 16px;
            font-size: 16px;
            border-radius: 12px;
        }
        
        .btn-send {
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            margin-top: 0.5rem;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: #6c757d;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: #0d6efd;
        }
        
        /* Alert styling */
        .alert-custom {
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 1rem;
            font-size: 14px;
        }
        
        /* Loading button */
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-loading i {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive adjustments */
        @media (max-width: 480px) {
            .reset-card {
                padding: 1.5rem;
            }
            
            .reset-icon {
                width: 60px;
                height: 60px;
            }
            
            .reset-icon i {
                font-size: 28px;
            }
            
            h3 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="reset-container">
    <div class="reset-card">
        <div class="reset-icon">
            <i class="fas fa-lock"></i>
        </div>
        
        <h3 class="text-center mb-2 fw-bold">Reset Password</h3>
        <p class="text-center text-muted mb-4">Enter your email and we'll send you a link to reset your password</p>
        
        <div id="alertMessage" style="display: none;" class="alert-custom"></div>
        
        <form id="forgotForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-envelope text-muted"></i>
                    </span>
                    <input type="email" 
                           class="form-control form-control-lg border-start-0" 
                           id="email" 
                           placeholder="your@email.com" 
                           required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 btn-send" id="submitBtn">
                <i class="fas fa-paper-plane me-2"></i> Send Reset Link
            </button>
        </form>
        
        <div class="back-link">
            <a href="login.html">
                <i class="fas fa-arrow-left me-1"></i> Back to Login
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="common.js"></script>
<script>
    
//const API_URL = (location.port && location.port === '5000') ? `${location.origin}/api` : 'http://localhost:5000/api';
    
    const form = document.getElementById('forgotForm');
    const submitBtn = document.getElementById('submitBtn');
    const alertDiv = document.getElementById('alertMessage');
    
    function showAlert(message, type) {
        alertDiv.style.display = 'block';
        alertDiv.className = `alert-custom alert-${type === 'success' ? 'success' : 'danger'}`;
        alertDiv.style.backgroundColor = type === 'success' ? '#d1e7dd' : '#f8d7da';
        alertDiv.style.color = type === 'success' ? '#0f5132' : '#842029';
        alertDiv.style.border = type === 'success' ? '1px solid #badbcc' : '1px solid #f5c2c7';
        alertDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'} me-2"></i> ${message}`;
        
        // Auto hide after 5 seconds
        setTimeout(() => {
            alertDiv.style.display = 'none';
        }, 5000);
    }
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        
        // Show loading state
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.classList.add('btn-loading');
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Sending...';
        
        try {
            const response = await fetch(`${API_URL}/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showAlert('✅ Password reset link sent! Check your email.', 'success');
                form.reset();
            } else {
                showAlert('❌ ' + (data.message || 'Email not found'), 'danger');
            }
        } catch (error) {
            showAlert('❌ Network error. Please try again.', 'danger');
        } finally {
            // Reset button
            submitBtn.disabled = false;
            submitBtn.classList.remove('btn-loading');
            submitBtn.innerHTML = originalText;
        }
    });
</script>
<script src="languages.js"></script>
</body>
</html>
