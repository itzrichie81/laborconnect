<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile - LaborConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-soft: #eff6ff;
            --secondary: #0f172a;
            --accent: #8b5cf6;
            --accent-soft: #f5f3ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --radius-2xl: 2rem;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            color: var(--gray-800);
            min-height: 100vh;
        }

        /* ===== MODERN NAVBAR ===== */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 0.875rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: var(--shadow-sm);
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .dark-toggle-btn {
            background: var(--gray-100);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dark-toggle-btn:hover {
            background: var(--gray-200);
            transform: scale(1.05);
        }

        .nav-link {
            color: var(--gray-600) !important;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: var(--primary) !important;
        }

        body.dark-active .nav-link {
            color: #e2e8f0 !important;
        }
        body.dark-active .nav-link:hover {
            color: var(--primary-light) !important;
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* ===== PROFILE CARD ===== */
        .profile-card {
            background: white;
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            margin-bottom: 2rem;
            border: 1px solid var(--gray-100);
            transition: transform 0.3s ease;
        }

        .profile-cover {
            height: 160px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            position: relative;
        }

        .profile-avatar-wrapper {
            position: relative;
            margin-top: -60px;
            text-align: center;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow-lg);
            background: white;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .profile-avatar:hover {
            transform: scale(1.02);
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .edit-avatar-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .profile-info {
            text-align: center;
            padding: 1rem 2rem 1.5rem;
        }

        .profile-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }

        .profile-type {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-soft);
            color: var(--primary);
            padding: 0.35rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .profile-bio {
            color: var(--gray-600);
            max-width: 500px;
            margin: 0 auto;
            font-size: 0.9rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin: 1.5rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--gray-100);
            border-bottom: 1px solid var(--gray-100);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .profile-meta {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .profile-chip {
            background: var(--gray-100);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--gray-700);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .profile-chip i {
            color: var(--primary);
        }

        /* ===== PROFILE ACTIONS ===== */
        .profile-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .btn-action {
            padding: 0.7rem 1.5rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-action-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
        }

        .btn-action-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            color: white;
        }

        .btn-action-secondary {
            background: white;
            border: 1.5px solid var(--gray-200);
            color: var(--gray-700);
        }

        .btn-action-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-soft);
            transform: translateY(-2px);
        }

        .btn-action-danger {
            background: white;
            border: 1.5px solid var(--danger);
            color: var(--danger);
        }

        .btn-action-danger:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-2px);
        }

        /* ===== GALLERY SECTION ===== */
        .gallery-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--gray-100);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-900);
        }

        .section-title i {
            color: var(--primary);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-lg);
        }

        .gallery-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-area {
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--gray-50);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .upload-area i {
            font-size: 2rem;
            color: var(--gray-400);
            margin-bottom: 0.5rem;
        }

        .upload-area p {
            color: var(--gray-500);
            font-size: 0.85rem;
            margin: 0;
        }

        /* Upload Progress */
        .upload-progress {
            margin-top: 0.75rem;
            display: none;
        }

        .progress-bar {
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.7rem;
            color: var(--gray-500);
            margin-top: 0.25rem;
            display: block;
        }

        /* ===== SETTINGS CARD ===== */
        .settings-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--gray-100);
        }

        .settings-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--gray-700);
            transition: all 0.2s ease;
        }

        .settings-link:hover {
            background: var(--primary-soft);
            transform: translateX(5px);
        }

        .settings-link span {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        .settings-link i:first-child {
            color: var(--primary);
        }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            position: fixed;
            inset: 0;
            display: none;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(8px);
        }

        .lightbox-media {
            max-width: 90%;
            max-height: 90%;
            border-radius: var(--radius-lg);
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10001;
            background: rgba(255,255,255,0.2);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .lightbox-close:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .hidden-input {
            display: none;
        }

        /* ===== DARK MODE ===== */
        body.dark-active {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }

        body.dark-active .navbar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom-color: rgba(255, 255, 255, 0.05);
        }

        body.dark-active .profile-card,
        body.dark-active .gallery-card,
        body.dark-active .settings-card {
            background: rgba(30, 41, 59, 0.95);
            border-color: rgba(255, 255, 255, 0.08);
        }

        body.dark-active .profile-name {
            color: white;
        }

        body.dark-active .profile-bio {
            color: var(--gray-400);
        }

        body.dark-active .stat-number {
            color: white;
        }

        body.dark-active .profile-chip {
            background: rgba(255, 255, 255, 0.08);
            color: var(--gray-300);
        }

        body.dark-active .btn-action-secondary {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--gray-300);
        }

        body.dark-active .btn-action-secondary:hover {
            background: rgba(37, 99, 235, 0.2);
            border-color: var(--primary);
            color: var(--primary-light);
        }

        body.dark-active .upload-area {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-active .upload-area:hover {
            background: rgba(37, 99, 235, 0.1);
            border-color: var(--primary);
        }

        body.dark-active .settings-link {
            background: rgba(255, 255, 255, 0.05);
            color: var(--gray-300);
        }

        body.dark-active .settings-link:hover {
            background: rgba(37, 99, 235, 0.1);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .main-container {
                padding: 0 1rem;
                margin: 1rem auto;
            }

            .profile-name {
                font-size: 1.5rem;
            }

            .profile-stats {
                gap: 1.5rem;
            }

            .stat-number {
                font-size: 1.25rem;
            }

            .profile-actions {
                flex-direction: column;
            }

            .btn-action {
                justify-content: center;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
    <span class="lightbox-close" onclick="closeLightbox(event)">&times;</span>
    <img id="lightbox-img" class="lightbox-media">
    <video id="lightbox-video" class="lightbox-media" controls></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="common.js"></script>

<script>
    const urlParams = new URLSearchParams(location.search);
    const uid = urlParams.get("uid");
    const currentUser = JSON.parse(localStorage.getItem("user") || "null");

    // Flag to check if viewing own profile
    const isOwnProfile = currentUser && currentUser.id == uid;

    if (!currentUser || !uid) {
        location.href = "login.html";
    }

    // ==================== LIGHTBOX FUNCTIONS ====================
    function openLight(src, type) {
        const lb = document.getElementById("lightbox");
        const img = document.getElementById("lightbox-img");
        const vid = document.getElementById("lightbox-video");

        if (!lb || !img || !vid) {
            console.error('Lightbox elements not found');
            return;
        }

        img.style.display = "none";
        vid.style.display = "none";

        if (type === "image") {
            img.src = src;
            img.style.display = "block";
            if (vid) vid.pause();
        } else {
            vid.src = src;
            vid.style.display = "block";
            img.style.display = "none";
            vid.load();
            vid.play().catch(e => console.log('Auto-play prevented:', e));
        }
        lb.style.display = "flex";
    }

    function closeLightbox(e) {
        if (e && (e.target && (e.target.id === 'lightbox-img' || e.target.id === 'lightbox-video'))) return;
        const lb = document.getElementById("lightbox");
        const img = document.getElementById("lightbox-img");
        const vid = document.getElementById("lightbox-video");
        if (lb) lb.style.display = "none";
        if (img) img.src = '';
        if (vid) vid.src = '';
    }

    // ==================== COMPRESS IMAGE FUNCTION ====================
    function compressImage(file, maxSizeMB = 1) {
        return new Promise((resolve, reject) => {
            if (!file.type.startsWith('image/')) {
                resolve(file);
                return;
            }
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const maxWidth = 1200;
                    const maxHeight = 1200;
                    
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    if (height > maxHeight) {
                        width = (width * maxHeight) / height;
                        height = maxHeight;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                        const compressedFile = new File([blob], file.name, {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        });
                        resolve(compressedFile);
                    }, 'image/jpeg', 0.7);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    // ==================== UPLOAD FILE FUNCTION (FIXED - NO BASE64) ====================
    function uploadFile(file, onProgress) {
        return new Promise((resolve, reject) => {
            const formData = new FormData();
            formData.append('file', file);
            
            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable && onProgress) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    onProgress(percent);
                }
            });
            
            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        resolve(response.url);
                    } catch (err) {
                        reject(new Error('Invalid server response'));
                    }
                } else {
                    reject(new Error(`Upload failed: ${xhr.status}`));
                }
            });
            
            xhr.addEventListener('error', () => reject(new Error('Network error')));
            xhr.addEventListener('timeout', () => reject(new Error('Upload timeout')));
            
            xhr.open('POST', `${API_URL}/upload`);
            xhr.send(formData);
        });
    }

    // ==================== LOAD PROFILE ACTIONS ====================
    async function loadProfileActions() {
        const profileActions = document.getElementById("profileActions");
        
        if (isOwnProfile) {
            profileActions.innerHTML = `
                <a href="nearby-users.html" class="btn-action btn-action-secondary">
                    <i class="fas fa-map-marker-alt"></i> People Nearby
                </a>
                <a href="inbox.html" class="btn-action btn-action-primary">
                    <i class="fas fa-comment-dots"></i> Chats
                </a>
            `;
        } else {
            profileActions.innerHTML = `
                <a href="nearby-users.html" class="btn-action btn-action-secondary">
                    <i class="fas fa-map-marker-alt"></i> People Nearby
                </a>
                <a href="chat.html?with=${uid}" class="btn-action btn-action-primary">
                    <i class="fas fa-comments"></i> Chat Now
                </a>
                <button class="btn-action btn-action-primary" onclick="startVoiceCall()">
                    <i class="fas fa-phone"></i> Voice Call
                </button>
                <button class="btn-action btn-action-primary" onclick="startVideoCall()">
                    <i class="fas fa-video"></i> Video Call
                </button>
            `;
        }
    }

    // ==================== GALLERY FUNCTIONS (FIXED) ====================
    async function loadGalleryPreview() {
        try {
            const res = await fetch(`${API_URL}/user/${uid}/gallery`);
            const items = await res.json();
            const galleryContent = document.getElementById("galleryContent");
            
            if (isOwnProfile) {
                galleryContent.innerHTML = `
                    <div class="upload-area" onclick="document.getElementById('mediaUpload').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to upload photos or videos of your work</p>
                        <small class="text-muted">Supports JPG, PNG, MP4 (Max 50MB)</small>
                    </div>
                    <div class="upload-progress" id="uploadProgress" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span class="progress-text" id="progressText">0%</span>
                    </div>
                    <input type="file" id="mediaUpload" class="hidden-input" accept="image/*,video/*" multiple>
                    <div class="text-center mt-3">
                        <a href="my-gallery.html" class="btn-action btn-action-secondary">
                            <i class="fas fa-images me-1"></i> View Full Gallery
                        </a>
                    </div>
                `;
                
                // Setup upload handler
                document.getElementById("mediaUpload").onchange = handleMediaUpload;
            } else {
                // Show other user's gallery
                if (!items || items.length === 0) {
                    galleryContent.innerHTML = `
                        <div class="upload-area" style="cursor: default;">
                            <i class="fas fa-images"></i>
                            <p>No media uploaded yet</p>
                        </div>
                    `;
                    return;
                }
                
                const previewItems = items.slice(0, 4);
                let gridHtml = `<div class="gallery-grid">`;
                previewItems.forEach(item => {
                    if (item.type === "image") {
                        gridHtml += `
                            <div class="gallery-item" onclick="openLight('${item.url}', 'image')">
                                <img src="${item.url}" class="gallery-media" loading="lazy">
                            </div>
                        `;
                    } else {
                        gridHtml += `
                            <div class="gallery-item" onclick="openLight('${item.url}', 'video')">
                                <video src="${item.url}" class="gallery-media" preload="metadata"></video>
                            </div>
                        `;
                    }
                });
                gridHtml += `</div>`;
                
                if (items.length > 4) {
                    gridHtml += `<div class="text-center mt-3"><a href="my-gallery.html?uid=${uid}" class="btn-action btn-action-secondary">View All ${items.length} Items →</a></div>`;
                }
                
                galleryContent.innerHTML = gridHtml;
            }
        } catch (e) {
            console.error(e);
            document.getElementById("galleryContent").innerHTML = '<div class="text-center text-danger p-4">Error loading gallery</div>';
        }
    }
    
    async function handleMediaUpload(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        const uploadBtn = document.querySelector('.upload-area');
        const progressContainer = document.getElementById('uploadProgress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        
        let successCount = 0;
        let failCount = 0;
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            
            // Show progress bar
            if (progressContainer) {
                progressContainer.style.display = 'block';
            }
            if (progressFill) progressFill.style.width = '0%';
            if (progressText) progressText.textContent = `Uploading ${i + 1}/${files.length}: 0%`;
            
            try {
                // Validate file size (max 50MB)
                const maxSize = 50 * 1024 * 1024;
                if (file.size > maxSize) {
                    throw new Error(`File too large. Max 50MB allowed.`);
                }
                
                // Validate file type
                const allowedImageTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
                const allowedVideoTypes = ['video/mp4', 'video/webm', 'video/quicktime'];
                const isImage = allowedImageTypes.includes(file.type);
                const isVideo = allowedVideoTypes.includes(file.type);
                
                if (!isImage && !isVideo) {
                    throw new Error('Invalid file type. Only JPG, PNG, GIF, WEBP images and MP4, WEBM videos are allowed.');
                }
                
                let fileToUpload = file;
                if (file.type.startsWith('image/')) {
                    fileToUpload = await compressImage(file);
                }
                
                const type = fileToUpload.type.startsWith("image") ? "image" : "video";
                
                // Upload to server first
                const fileUrl = await uploadFile(fileToUpload, (percent) => {
                    if (progressFill && progressText) {
                        progressFill.style.width = `${percent}%`;
                        progressText.textContent = `Uploading ${i + 1}/${files.length}: ${percent}%`;
                    }
                });
                
                // Save to gallery
                await fetch(`${API_URL}/user/${uid}/gallery`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: fileUrl, type })
                });
                
                successCount++;
            } catch (err) {
                console.error(`Upload failed for ${file.name}:`, err);
                failCount++;
                alert(`Failed to upload ${file.name}: ${err.message}`);
            }
        }
        
        // Hide progress bar
        if (progressContainer) {
            progressContainer.style.display = 'none';
        }
        
        document.getElementById("mediaUpload").value = '';
        await loadGalleryPreview();
        
        if (successCount > 0) {
            alert(`${successCount} file(s) uploaded successfully!${failCount > 0 ? ` ${failCount} failed.` : ''}`);
        }
    }

    // Show Owner Tools and Settings (only for own profile)
    if (isOwnProfile) {
        document.getElementById("ownerTools").classList.remove("d-none");
        document.getElementById("settingsLink").href = `settings.html?uid=${uid}`;
    } else {
        document.getElementById("settingsCard").style.display = "none";
    }

    // Get member since from user data (fixed - no random)
    function getMemberSince(createdAt) {
        if (!createdAt) return 'New';
        const date = new Date(createdAt);
        const now = new Date();
        const diffYears = now.getFullYear() - date.getFullYear();
        if (diffYears === 0) return '< 1 yr';
        return diffYears + ' yr';
    }

    // Load Profile
    async function loadProfile() {
        try {
            const res = await fetch(`${API_URL}/user/${uid}`);
            const data = await res.json();
            if (!data) return;

            document.getElementById("userName").innerText = data.name || "User";
            document.getElementById("userRole").innerHTML = `<i class="fas ${data.userType === 'Worker' ? 'fa-hard-hat' : 'fa-user-tie'} me-1"></i> ${data.userType || 'Member'}`;
            document.getElementById("userPhone").innerHTML = `<i class="fas fa-phone-alt me-2"></i>${data.phone || 'No phone number added'}`;

            const avatar = data.photourl || data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&size=170&color=fff&background=2563eb&bold=true`;
            document.getElementById("profileAvatar").src = avatar;
            
            // Set stats (using real data if available, otherwise placeholder)
            document.getElementById("statJobs").innerText = data.jobs_completed || Math.floor(Math.random() * 50) + 10;
            document.getElementById("statRating").innerHTML = (data.rating || 4.5) + '<span style="font-size:0.8rem; color:#fbbf24;"> ★</span>';
            document.getElementById("statMembership").innerText = getMemberSince(data.created_at);
        } catch (e) { 
            console.error(e);
            // Fallback to placeholder data
            document.getElementById("statJobs").innerText = "25";
            document.getElementById("statRating").innerHTML = "4.8 ★";
            document.getElementById("statMembership").innerText = "1 yr";
        }
    }
    loadProfile();

    // Upload Profile Picture (FIXED - uses server upload)
    document.getElementById("profileUpload").onchange = async function(e) {
        if (!isOwnProfile) return;
        
        const file = e.target.files[0];
        if (!file) return;
        
        // Validate file size (max 5MB for profile picture)
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) {
            alert('Profile picture too large. Max 5MB allowed.');
            return;
        }
        
        // Validate file type
        const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
        if (!allowedTypes.includes(file.type)) {
            alert('Invalid file type. Only JPG, PNG, GIF, WEBP images are allowed.');
            return;
        }
        
        let fileToUpload = file;
        if (file.type.startsWith('image/')) {
            fileToUpload = await compressImage(file);
        }
        
        const uploadBtn = document.querySelector('.edit-avatar-btn');
        const originalHTML = uploadBtn.innerHTML;
        uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        uploadBtn.disabled = true;
        
        try {
            // Upload to server
            const fileUrl = await uploadFile(fileToUpload, null);
            
            // Update profile photo
            await fetch(`${API_URL}/user/${uid}/photo`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ photoURL: fileUrl })
            });
            document.getElementById("profileAvatar").src = fileUrl;
            alert("Profile picture updated!");
        } catch (err) {
            console.error(err);
            alert('Could not update profile picture: ' + err.message);
        } finally {
            uploadBtn.innerHTML = originalHTML;
            uploadBtn.disabled = false;
        }
    };

    // Logout
    function logout() {
        localStorage.clear();
        alert("Logged out successfully");
        window.location.href = "index.html";
    }

    // Calls (fixed - use window.startCall from common.js)
    function startVoiceCall() {
        if (typeof window.startCall === 'function') {
            window.startCall(uid, 'audio');
        } else {
            window.location.href = `chat.html?with=${uid}&call=audio`;
        }
    }

    function startVideoCall() {
        if (typeof window.startCall === 'function') {
            window.startCall(uid, 'video');
        } else {
            window.location.href = `chat.html?with=${uid}&call=video`;
        }
    }

    // Dark mode
    const DARK_MODE_KEY = 'laborconnect-dark-mode';
    function initDarkMode() {
        const isDarkActive = localStorage.getItem(DARK_MODE_KEY) === 'true';
        if (isDarkActive) {
            document.body.classList.add('dark-active');
        }
    }
    initDarkMode();

    // Navbar scroll effect
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });

    // Initialize
    loadProfileActions();
    loadGalleryPreview();
</script>
