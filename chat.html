<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat - LaborConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%232563eb'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-weight='800' font-family='Arial, sans-serif'>LC</text></svg>">
    
    <link href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,800|Poppins:600,700&display=swap" rel="stylesheet" crossorigin="anonymous">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ===== CHAT PAGE OPTIMIZED STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            touch-action: manipulation;
        }

        .chat-page {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .chat-page .navbar {
            display: none !important;
        }

        .chat-container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.05);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .chat-header {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .chat-header .btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .chat-header .btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .chat-avatar:hover {
            transform: scale(1.05);
        }

        .chat-avatar i {
            font-size: 22px;
            color: white;
        }

        .chat-user-info {
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }

        .chat-user-name {
            font-size: 1rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
            word-break: break-word;
            max-width: 180px;
            overflow-wrap: break-word;
            display: -webkit-box;
            display: box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .chat-user-name {
                max-width: 120px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .chat-user-name {
                max-width: 90px;
                font-size: 0.85rem;
            }
        }

        .chat-user-status {
            font-size: 0.7rem;
            opacity: 0.9;
            margin: 0;
        }

        .chat-user-status.online {
            color: #90ff90;
        }

        .chat-actions {
            display: flex;
            gap: 0.5rem;
        }

        .chat-actions .btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .chat-messages {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1rem;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 0.25rem;
            position: relative;
        }

        .message-bubble {
            user-select: text;
            -webkit-user-select: text;
        }

        .message-option-btn {
            position: absolute;
            top: 6px;
            border: none;
            background: rgba(37, 99, 235, 0.12);
            color: #2563eb;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 2;
        }

        .message.sent .message-option-btn {
            right: -8px;
        }

        .message.received .message-option-btn {
            left: -8px;
        }

        .message:hover .message-option-btn {
            opacity: 1;
            transform: scale(1.02);
        }

        .message:last-child {
            margin-bottom: 0;
        }

        .message.sent {
            align-items: flex-end;
        }

        .message.received {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-break: break-word;
            position: relative;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: white;
            color: #1f2937;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .message-time {
            font-size: 0.6rem;
            color: #9ca3af;
            margin-top: 2px;
            margin-left: 8px;
            margin-right: 8px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .voice-card {
            background: rgba(37, 99, 235, 0.08);
            border-radius: 18px;
            padding: 10px 16px;
            min-width: 220px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(37, 99, 235, 0.06);
            transition: all 0.3s ease;
        }

        .voice-card:hover {
            background: rgba(37, 99, 235, 0.12);
            border-color: rgba(37, 99, 235, 0.12);
        }

        .voice-player {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .voice-play-btn {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .voice-play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35);
        }

        .voice-play-btn:active {
            transform: scale(0.95);
        }

        .voice-play-btn i {
            pointer-events: none;
        }

        .voice-wave-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            height: 36px;
            padding: 0 4px;
            cursor: pointer;
            position: relative;
        }

        .voice-wave-bars-playback {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 32px;
            flex: 1;
        }

        .voice-wave-bars-playback .bar {
            display: inline-block;
            width: 4px;
            border-radius: 2px;
            background: linear-gradient(180deg, #93c5fd, #3b82f6);
            transition: height 0.15s ease;
            min-height: 6px;
        }

        .message.sent .voice-wave-bars-playback .bar {
            background: linear-gradient(180deg, #93c5fd, #60a5fa);
        }

        .message.received .voice-wave-bars-playback .bar {
            background: linear-gradient(180deg, #93c5fd, #3b82f6);
        }

        .voice-wave-bars-playback.playing .bar {
            animation: wavePlay 0.8s ease-in-out infinite alternate;
        }

        .voice-wave-bars-playback.playing .bar:nth-child(1) { animation-delay: 0s; }
        .voice-wave-bars-playback.playing .bar:nth-child(2) { animation-delay: 0.1s; }
        .voice-wave-bars-playback.playing .bar:nth-child(3) { animation-delay: 0.2s; }
        .voice-wave-bars-playback.playing .bar:nth-child(4) { animation-delay: 0.3s; }
        .voice-wave-bars-playback.playing .bar:nth-child(5) { animation-delay: 0.15s; }
        .voice-wave-bars-playback.playing .bar:nth-child(6) { animation-delay: 0.05s; }
        .voice-wave-bars-playback.playing .bar:nth-child(7) { animation-delay: 0.25s; }
        .voice-wave-bars-playback.playing .bar:nth-child(8) { animation-delay: 0.35s; }

        @keyframes wavePlay {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }

        .voice-duration {
            font-size: 0.7rem;
            font-weight: 600;
            color: #6b7280;
            min-width: 32px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .message.sent .voice-duration {
            color: rgba(255, 255, 255, 0.8);
        }

        .message.received .voice-duration {
            color: #6b7280;
        }

        .voice-progress {
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(37, 99, 235, 0.15);
            border-radius: 2px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .voice-progress .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #7c3aed);
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .voice-card:hover .voice-progress {
            opacity: 1;
        }

        body.dark-active .voice-card {
            background: rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.1);
        }

        body.dark-active .voice-card:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        body.dark-active .voice-duration {
            color: #94a3b8;
        }

        body.dark-active .message.sent .voice-duration {
            color: rgba(255, 255, 255, 0.8);
        }

        body.dark-active .voice-play-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        .media-card img,
        .media-card video {
            max-width: 250px;
            max-height: 200px;
            border-radius: 12px;
        }

        .call-notification {
            background: rgba(37, 99, 235, 0.08);
            border-radius: 16px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .call-notification:hover {
            background: rgba(37, 99, 235, 0.15);
        }

        .call-notification.missed {
            background: rgba(239, 68, 68, 0.08);
        }

        .call-notification i {
            font-size: 18px;
            width: 28px;
            text-align: center;
        }

        .call-notification .call-info {
            flex: 1;
        }

        .call-notification .call-title {
            font-size: 0.8rem;
            font-weight: 500;
            margin: 0;
        }

        .call-notification .call-subtitle {
            font-size: 0.65rem;
            color: #6b7280;
            margin: 0;
        }

        .chat-input {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom, 0px));
            background: white;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            z-index: 20;
            transition: padding-bottom 0.18s ease;
        }

        .chat-input.recording {
            background: #fff7f7;
        }

        .chat-input.recording #recordToggle {
            color: #dc2626;
        }

        .input-with-icons {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            flex: 1;
            background: #f3f4f6;
            border-radius: 30px;
            padding: 0.35rem 0.6rem;
        }

        .input-with-icons .icon-btn {
            background: transparent;
            border: none;
            color: #6b7280;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-with-icons .icon-btn:hover {
            background: #e5e7eb;
            color: #2563eb;
        }

        .input-with-icons input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            padding: 0.5rem 0;
            font-size: 0.9rem;
        }

        .btn-send {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send:hover {
            transform: scale(1.05);
        }

        .reply-preview-panel {
            padding: 6px 12px;
            border-left: 3px solid #2563eb;
            background: rgba(37, 99, 235, 0.08);
            margin: 0 1rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .context-menu {
            position: fixed !important;
            z-index: 99999 !important;
            min-width: 200px !important;
            background: rgba(44, 44, 46, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-radius: 14px !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4) !important;
            overflow: hidden !important;
            padding: 8px 0 !important;
        }

        @media (min-width: 769px) {
            .context-menu {
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
                max-height: 80vh !important;
                overflow-y: auto !important;
                min-width: 280px !important;
                border-radius: 16px !important;
            }
        }

        @media (max-width: 768px) {
            .context-menu {
                top: auto !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                transform: none !important;
                width: 100% !important;
                border-radius: 20px 20px 0 0 !important;
                max-height: 70vh !important;
                padding: 12px 0 env(safe-area-inset-bottom, 20px) !important;
                animation: slideUpMenu 0.35s cubic-bezier(0.32, 0.72, 0, 1) !important;
                background: rgba(44, 44, 46, 0.98) !important;
            }
            
            .context-menu::before {
                content: '';
                position: absolute;
                top: 8px;
                left: 50%;
                transform: translateX(-50%);
                width: 40px;
                height: 5px;
                background: rgba(255,255,255,0.3);
                border-radius: 4px;
                z-index: 1;
            }
        }

        .context-menu-item {
            padding: 14px 20px !important;
            font-size: 15px !important;
            border-bottom: 0.5px solid rgba(255,255,255,0.08) !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            gap: 14px !important;
            color: #ffffff !important;
            background: transparent !important;
            transition: background 0.15s ease !important;
            min-height: 48px !important;
        }

        .context-menu-item:last-child {
            border-bottom: none !important;
            border-radius: 0 0 14px 14px !important;
        }

        .context-menu-item:first-child {
            border-radius: 14px 14px 0 0 !important;
        }

        .context-menu-item:hover {
            background: rgba(255,255,255,0.1) !important;
        }

        .context-menu-item:active {
            background: rgba(255,255,255,0.15) !important;
        }

        .context-menu-item.danger {
            color: #ff453a !important;
        }

        .context-menu-item i {
            width: 24px !important;
            text-align: center !important;
            flex-shrink: 0 !important;
            font-size: 18px !important;
            color: rgba(255,255,255,0.7) !important;
        }

        .context-menu-item.danger i {
            color: #ff453a !important;
        }

        .context-menu-divider {
            height: 0.5px !important;
            background: rgba(255,255,255,0.08) !important;
            margin: 0 !important;
        }

        @keyframes slideUpMenu {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        body.dark-active .context-menu {
            background: rgba(44, 44, 46, 0.98) !important;
        }

        .selection-mode .message-checkbox {
            display: block;
        }

        .message-checkbox {
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            cursor: pointer;
            display: none;
        }

        .selection-mode .message {
            margin-left: 25px;
        }

        .message.selected .message-bubble {
            outline: 2px solid #2563eb;
        }

        .selection-toolbar {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            z-index: 10001;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .selection-toolbar button {
            background: none;
            border: none;
            color: white;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .selection-toolbar button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .selection-toolbar .delete-selected {
            color: #f87171;
        }

        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 1000;
        }

        .connection-status.connected {
            background: #10b981;
            color: white;
        }

        .connection-status.disconnected {
            background: #ef4444;
            color: white;
        }

        .connection-status.connecting {
            background: #f59e0b;
            color: #1f2937;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-media {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #recordToggle.recording-active {
            color: #dc2626 !important;
            background: rgba(220, 38, 38, 0.15) !important;
            animation: pulse-record 1.2s infinite;
        }

        @keyframes pulse-record {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .voice-recording-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 10002;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.2s ease;
            user-select: none;
            pointer-events: none;
        }

        .voice-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 10002;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scaleY(0.6); }
            100% { opacity: 1; transform: scaleY(1); }
        }

        .voice-wave-bars {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 20px;
        }

        .voice-wave-bars span {
            display: inline-block;
            width: 3px;
            background: #dc2626;
            border-radius: 2px;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        .voice-wave-bars span:nth-child(2) { height: 14px; animation-delay: 0.2s; }
        .voice-wave-bars span:nth-child(3) { height: 20px; animation-delay: 0.4s; }

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="common.js"></script>
<script>
    // ===== UNLOCK AUDIO ON MOBILE =====
    function unlockAudio() {
        if (window.AudioContext || window.webkitAudioContext) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
            } catch (e) { console.log('AudioContext unlock:', e); }
        }
    }

    // Unlock audio on any user interaction
    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchstart', unlockAudio, { passive: true });
    document.addEventListener('touchend', unlockAudio, { passive: true });

    // ==================== CONFIGURATION ====================
    const socket = io(SOCKET_URL, { transports: ['websocket', 'polling'], reconnection: true });
    
    const urlParams = new URLSearchParams(location.search);
    const otherUserId = urlParams.get('with');
    const currentUser = JSON.parse(localStorage.getItem('user') || 'null');
    const chatId = `${Math.min(currentUser?.id, otherUserId)}-${Math.max(currentUser?.id, otherUserId)}`;
    
    if (!currentUser || !currentUser.id || !otherUserId) {
        window.location.href = 'login.html';
    }
    
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const chatStatus = document.getElementById('chatStatus');
    const chatTitle = document.getElementById('chatTitle');
    const chatAvatar = document.getElementById('chatAvatar');
    const chatUserInfo = document.getElementById('chatUserInfo');
    const selectModeBtn = document.getElementById('selectModeBtn');
    const selectionToolbar = document.getElementById('selectionToolbar');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const closeSelectionBtn = document.getElementById('closeSelectionBtn');
    const selectionCountSpan = document.getElementById('selectionCount');

    let messages = [];
    let replyToMessage = null;
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let pendingVoiceBlob = null;
    let pendingVoiceFileName = '';
    let otherUserName = '';
    let otherUserPhoto = null;
    let isSelectionMode = false;
    let selectedMessages = new Set();
    let contextMenu = null;
    let localStream = null;

    socket.emit('register-user', currentUser.id);
    window.currentChatId = chatId;

    function scrollChatToBottom() {
        if (!chatMessages) return;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function syncChatLayout() {
        // Simple layout - let CSS handle it
        // Just scroll to bottom when keyboard appears
        if (window.visualViewport) {
            const height = window.visualViewport.height;
            const container = document.querySelector('.chat-container');
            if (container) {
                container.style.height = height + 'px';
                container.style.maxHeight = height + 'px';
            }
        }
        scrollChatToBottom();
    }

    function formatTime(dateString) {
        if (!dateString) return '';
        const date = new Date(dateString);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        
        if (date >= today) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else {
            return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }
    }

    function formatDuration(seconds) {
        if (!seconds || seconds === 0) return '';
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        if (mins > 0) return `${mins}:${secs.toString().padStart(2, '0')}`;
        return `0:${secs.toString().padStart(2, '0')}`;
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function getMessageSenderId(message) {
        return message?.fromuser || message?.fromUser || message?.from || '';
    }

    async function loadChatUser() {
        try {
            const res = await fetch(`${API_URL}/user/${otherUserId}`);
            const user = await res.json();
            if (user && user.name) {
                otherUserName = user.name;
                otherUserPhoto = user.photourl || user.photoURL;
                chatTitle.textContent = user.name;
                
                if (otherUserPhoto && otherUserPhoto !== 'null') {
                    chatAvatar.innerHTML = `<img src="${otherUserPhoto}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                } else {
                    const initials = user.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    chatAvatar.innerHTML = `<div style="width:100%;height:100%;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px;">${initials}</div>`;
                }
                updateStatusDisplay({ is_online: false, status: 'checking', last_active: null });
                startStatusChecking();
            }
        } catch (e) {
            console.error('Failed to load user:', e);
            otherUserName = `User ${otherUserId}`;
            chatTitle.textContent = `User ${otherUserId}`;
            updateStatusDisplay({ is_online: false, status: 'offline', last_active: null });
        }
    }

    let statusCheckInterval = null;

    async function checkUserStatus() {
        if (!otherUserId) return;
        try {
            const response = await fetch(`${API_URL}/user/${otherUserId}/status`);
            const data = await response.json();
            updateStatusDisplay(data);
        } catch (err) {
            console.error('Error checking status:', err);
        }
    }

    function updateStatusDisplay(data) {
        const statusEl = document.getElementById('chatStatus');
        if (!statusEl) return;

        if (data?.status === 'checking') {
            statusEl.innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #cbd5e1;"></i> Checking...';
            statusEl.classList.remove('online');
            statusEl.classList.remove('offline');
            return;
        }

        if (data?.is_online || data?.status === 'online') {
            statusEl.innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #90ff90;"></i> Online';
            statusEl.classList.add('online');
            statusEl.classList.remove('offline');
            return;
        }

        let statusText = 'Offline';
        if (data?.last_active) {
            const lastActive = new Date(data.last_active);
            const now = new Date();
            const diffMinutes = Math.floor((now - lastActive) / (1000 * 60));
            const diffHours = Math.floor(diffMinutes / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffMinutes < 1) {
                statusText = 'Just now';
            } else if (diffMinutes < 60) {
                statusText = `${diffMinutes}m ago`;
            } else if (diffHours < 24) {
                statusText = `${diffHours}h ago`;
            } else if (diffDays === 1) {
                statusText = 'Yesterday';
            } else {
                statusText = `${diffDays}d ago`;
            }
        }

        statusEl.innerHTML = `<i class="fas fa-circle" style="font-size: 8px; color: #94a3b8;"></i> ${statusText}`;
        statusEl.classList.remove('online');
        statusEl.classList.add('offline');
    }

    window.updateUserStatus = function(userId, isOnline, lastActive) {
        if (String(userId) !== String(otherUserId)) return;
        updateStatusDisplay({ is_online: isOnline, status: isOnline ? 'online' : 'offline', last_active: lastActive });
    };

    function startStatusChecking() {
        if (statusCheckInterval) clearInterval(statusCheckInterval);
        checkUserStatus();
        statusCheckInterval = setInterval(checkUserStatus, 30000);
    }

    function stopStatusChecking() {
        if (statusCheckInterval) {
            clearInterval(statusCheckInterval);
            statusCheckInterval = null;
        }
    }

    window.addEventListener('beforeunload', () => {
        stopStatusChecking();
    });

    async function loadMessages() {
        try {
            const res = await fetch(`${API_URL}/messages/${chatId}?userId=${currentUser.id}`);
            messages = await res.json();
            renderMessages();
        } catch (e) {
            console.error('Unable to load messages', e);
        }
    }

    function renderMessages() {
        const visibleMessages = messages.filter(msg => {
            const deletedFor = msg.deleted_for || '';
            const deletedList = deletedFor.split(',');
            return !deletedList.includes(String(currentUser.id));
        });
        
        chatMessages.innerHTML = '';
        
        visibleMessages.forEach((msg) => {
            const messageRow = document.createElement('div');
            const isSent = String(getMessageSenderId(msg)) === String(currentUser.id);
            messageRow.className = `message ${isSent ? 'sent' : 'received'}`;
            messageRow.setAttribute('data-message-id', msg.id);
            
            let content = '';
            const replyId = msg.replyTo || msg.replyto;
            
            if (replyId) {
                const replied = messages.find(m => String(m.id) === String(replyId));
                if (replied) {
                    const previewText = replied.type === 'voice' ? 'Voice note' : (replied.text || '').substring(0, 50);
                    content += `<div class="reply-preview" style="font-size:0.7rem; opacity:0.7; margin-bottom:4px;">↳ Replying to: ${escapeHtml(previewText)}</div>`;
                }
            }
            
<!-- ===== VOICE MESSAGE PLAYER - IOS FIXED ===== -->
if (msg.type === 'voice') {
    const barHeights = [8, 16, 24, 18, 30, 22, 14, 10];
    const barsHtml = barHeights.map(h => 
        `<span class="bar" style="height:${h}px;"></span>`
    ).join('');
    
    let audioSrc = msg.payload || '';
    // Add cache-busting for all devices
    audioSrc = audioSrc + (audioSrc.includes('?') ? '&' : '?') + 't=' + Date.now();
    
    content += `<div class="message-bubble voice-card" data-audio-url="${audioSrc}">
        <div class="voice-player">
            <button class="voice-play-btn" onclick="toggleVoicePlayback(this)" type="button">
                <i class="fas fa-play"></i>
            </button>
            <div class="voice-wave-container">
                <div class="voice-wave-bars-playback">
                    ${barsHtml}
                </div>
                <span class="voice-duration">0:00</span>
                <div class="voice-progress">
                    <div class="progress-fill"></div>
                </div>
            </div>
            <audio preload="metadata" playsinline crossorigin="anonymous" style="display:none;"></audio>
        </div>
    </div>`;
}
            else if (msg.type === 'call') {
                try {
                    const callData = typeof msg.payload === 'string' ? JSON.parse(msg.payload) : msg.payload;
                    const isMissed = callData.call_status === 'missed' && String(callData.caller_id) !== String(currentUser.id);
                    const callTypeIcon = callData.call_type === 'video' ? '<i class="fas fa-video"></i>' : '<i class="fas fa-phone"></i>';
                    const duration = callData.duration || 0;
                    const durationText = duration > 0 ? formatDuration(duration) : '';
                    
                    let statusText = '';
                    if (callData.call_status === 'missed') statusText = 'Missed call';
                    else if (callData.call_status === 'ended') statusText = `Call ended ${durationText ? '(' + durationText + ')' : ''}`;
                    else statusText = isSent ? 'Outgoing call' : 'Incoming call';
                    
                    content += `<div class="message-bubble call-notification ${isMissed ? 'missed' : ''}" onclick="window.location.href='chat.html?with=${callData.caller_id == currentUser.id ? callData.receiver_id : callData.caller_id}'">
                        ${callTypeIcon}
                        <div class="call-info">
                            <div class="call-title">${statusText}</div>
                            <div class="call-subtitle">${formatTime(callData.started_at)}</div>
                        </div>
                        <i class="fas fa-chevron-right" style="font-size:12px;"></i>
                    </div>`;
                } catch(e) {
                    content += `<div class="message-bubble">Call notification</div>`;
                }
            } 
            else {
                content += `<div class="message-bubble">${escapeHtml(msg.text || '')}</div>`;
            }
            
            content += `<div class="message-time">${formatTime(msg.time)}</div>`;
            messageRow.innerHTML = content;

            // Update voice duration when audio loads
            if (msg.type === 'voice') {
                const audio = messageRow.querySelector('audio');
                const durationSpan = messageRow.querySelector('.voice-duration');
                if (audio && durationSpan) {
                    audio.addEventListener('loadedmetadata', function() {
                        const mins = Math.floor(audio.duration / 60);
                        const secs = Math.floor(audio.duration % 60);
                        durationSpan.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    });
                }
            }

            const actionButton = document.createElement('button');
            actionButton.type = 'button';
            actionButton.className = 'message-option-btn';
            actionButton.title = 'Message options';
            actionButton.innerHTML = '<i class="fas fa-ellipsis-h"></i>';
            actionButton.addEventListener('click', (e) => {
                e.stopPropagation();
                showContextMenu(msg.id, e.clientX, e.clientY, isSent);
            });
            messageRow.appendChild(actionButton);

            messageRow.addEventListener('click', (e) => {
                if (!isSelectionMode) return;
                if (e.target.closest('.message-option-btn, .message-checkbox, a, button, input, textarea, select')) return;
                toggleSelectionForMessage(msg.id, !selectedMessages.has(String(msg.id)));
            });
            
            messageRow.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                removeContextMenu();
                showContextMenu(msg.id, e.clientX, e.clientY, isSent);
                return false;
            });
            
            let pressTimer;
            messageRow.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    const touch = e.touches[0];
                    showContextMenu(msg.id, touch.clientX, touch.clientY, isSent);
                }, 500);
            });
            messageRow.addEventListener('touchend', () => clearTimeout(pressTimer));
            messageRow.addEventListener('touchmove', () => clearTimeout(pressTimer));
            
            chatMessages.appendChild(messageRow);
        });
        
        scrollChatToBottom();
        
        if (isSelectionMode) {
            document.querySelectorAll('.message').forEach(msg => {
                if (!msg.querySelector('.message-checkbox')) {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'message-checkbox';
                    checkbox.setAttribute('data-msg-id', msg.getAttribute('data-message-id'));
                    checkbox.addEventListener('change', function(e) {
                        e.stopPropagation();
                        const msgId = this.getAttribute('data-msg-id');
                        toggleSelectionForMessage(msgId, this.checked);
                    });
                    msg.insertBefore(checkbox, msg.firstChild);
                }
            });
        }
    }

    async function sendMessage() {
        const text = messageInput.value.trim();

        if (pendingVoiceBlob) {
            try {
                const uploadUrl = await uploadFile(pendingVoiceFileName ? new File([pendingVoiceBlob], pendingVoiceFileName, { type: pendingVoiceBlob.type || 'audio/webm' }) : new File([pendingVoiceBlob], 'voice-note.webm', { type: pendingVoiceBlob.type || 'audio/webm' }));
                const payload = {
                    chatId,
                    from: currentUser.id,
                    to: otherUserId,
                    text: 'Voice note',
                    type: 'voice',
                    payload: uploadUrl,
                    replyTo: replyToMessage?.id || null
                };
                socket.emit('send-message', payload);
                pendingVoiceBlob = null;
                pendingVoiceFileName = '';
                replyToMessage = null;
                updateReplyPreview();
                if (messageInput) messageInput.value = '';
                return;
            } catch (error) {
                console.error('Voice message upload failed', error);
                alert('Voice upload failed. Please try again.');
                return;
            }
        }

        if (!text) return;
        
        const payload = {
            chatId,
            from: currentUser.id,
            to: otherUserId,
            text,
            type: 'text',
            payload: null,
            replyTo: replyToMessage?.id || null
        };
        
        socket.emit('send-message', payload);
        replyToMessage = null;
        updateReplyPreview();
        messageInput.value = '';
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        const response = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
        const json = await response.json();
        return json.url;
    }

    async function uploadAndSendMedia(file) {
        const url = await uploadFile(file);
        const payload = {
            chatId,
            from: currentUser.id,
            to: otherUserId,
            text: file.name,
            type: 'media',
            payload: url,
            replyTo: replyToMessage?.id || null
        };
        socket.emit('send-message', payload);
        replyToMessage = null;
        updateReplyPreview();
    }

    // ===== VOICE PLAYBACK - MOBILE FIXED =====
window.toggleVoicePlayback = function(button) {
    console.log('Voice play button clicked');
    
    const voiceCard = button.closest('.voice-card');
    if (!voiceCard) {
        console.error('Voice card not found');
        return;
    }
    
    const audio = voiceCard.querySelector('audio');
    if (!audio) {
        console.error('Audio element not found');
        return;
    }
    
    console.log('Audio src:', audio.src);
    
    const waveBars = voiceCard.querySelector('.voice-wave-bars-playback');
    const progressFill = voiceCard.querySelector('.progress-fill');
    const durationSpan = voiceCard.querySelector('.voice-duration');
    
    // FIX: Resume audio context on mobile
    if (window.AudioContext || window.webkitAudioContext) {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
                console.log('AudioContext resumed');
            }
        } catch (e) { 
            console.log('AudioContext error:', e); 
        }
    }

    // If another audio is playing, pause it first
    document.querySelectorAll('.voice-player audio').forEach(otherAudio => {
        if (otherAudio !== audio && !otherAudio.paused) {
            otherAudio.pause();
            const otherBtn = otherAudio.closest('.voice-player')?.querySelector('.voice-play-btn');
            if (otherBtn) {
                otherBtn.innerHTML = '<i class="fas fa-play"></i>';
                otherBtn.style.background = '';
                const otherWaves = otherBtn.closest('.voice-card')?.querySelector('.voice-wave-bars-playback');
                if (otherWaves) otherWaves.classList.remove('playing');
            }
        }
    });
    
    if (audio.paused) {
        // FIX: FORCE reload audio - important for sent messages on mobile
        console.log('Loading audio...');
        audio.load();
        
        // FIX: Set current time to 0
        audio.currentTime = 0;
        
        // Update duration display
        if (durationSpan) {
            // Show loading state
            durationSpan.textContent = '...';
        }
        
        // FIX: Play with retry for mobile
        const playAudio = function() {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log('Playback started successfully');
                    button.innerHTML = '<i class="fas fa-pause"></i>';
                    button.style.background = 'linear-gradient(135deg, #dc2626 0%, #ef4444 100%)';
                    if (waveBars) waveBars.classList.add('playing');
                }).catch(err => {
                    console.warn('Playback failed:', err);
                    button.innerHTML = '<i class="fas fa-play"></i>';
                    button.style.background = '';
                    // Try one more time after a short delay (mobile fix)
                    setTimeout(() => {
                        console.log('Retrying playback...');
                        audio.load();
                        audio.play().then(() => {
                            console.log('Playback succeeded on retry');
                            button.innerHTML = '<i class="fas fa-pause"></i>';
                            button.style.background = 'linear-gradient(135deg, #dc2626 0%, #ef4444 100%)';
                            if (waveBars) waveBars.classList.add('playing');
                        }).catch(e => console.warn('Retry failed:', e));
                    }, 300);
                });
            }
        };
        
        // Wait for audio to be ready
        if (audio.readyState >= 2) {
            playAudio();
        } else {
            audio.addEventListener('canplaythrough', function onCanPlay() {
                audio.removeEventListener('canplaythrough', onCanPlay);
                playAudio();
            });
            // Fallback: try after 1 second even if not loaded
            setTimeout(playAudio, 1000);
        }
        
        // Update duration when metadata loads
        audio.addEventListener('loadedmetadata', function() {
            if (durationSpan && audio.duration) {
                const mins = Math.floor(audio.duration / 60);
                const secs = Math.floor(audio.duration % 60);
                durationSpan.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        });
        
        // Update progress
        if (progressFill) {
            audio.addEventListener('timeupdate', function() {
                if (audio.duration) {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = progress + '%';
                }
            });
        }
        
        audio.onended = function() {
            console.log('Playback ended');
            button.innerHTML = '<i class="fas fa-play"></i>';
            button.style.background = '';
            if (waveBars) waveBars.classList.remove('playing');
            if (progressFill) progressFill.style.width = '0%';
            if (durationSpan && audio.duration) {
                const mins = Math.floor(audio.duration / 60);
                const secs = Math.floor(audio.duration % 60);
                durationSpan.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        };
        
        audio.onerror = function(e) {
            console.error('Audio error:', e);
            button.innerHTML = '<i class="fas fa-play"></i>';
            button.style.background = '';
            if (waveBars) waveBars.classList.remove('playing');
            // Try reloading the audio
            console.log('Reloading audio due to error...');
            audio.load();
        };
        
    } else {
        // Pause
        console.log('Pausing playback');
        audio.pause();
        button.innerHTML = '<i class="fas fa-play"></i>';
        button.style.background = '';
        if (waveBars) waveBars.classList.remove('playing');
    }
};

    // ===== VOICE RECORDING =====
    const recordToggle = document.getElementById('recordToggle');
    let voiceStream = null;
    let recordingTimer = null;
    let recordingSeconds = 0;
    let isCancelled = false;
    let recordingIndicator = null;

    recordToggle.addEventListener('mousedown', startVoiceRecording);
    recordToggle.addEventListener('touchstart', startVoiceRecording, { passive: false });
    recordToggle.addEventListener('mouseup', stopVoiceRecording);
    recordToggle.addEventListener('touchend', stopVoiceRecording, { passive: false });
    recordToggle.addEventListener('mouseleave', stopVoiceRecording);

    async function startVoiceRecording(e) {
        e.preventDefault();
        if (isRecording) return;
        isCancelled = false;
        
        try {
            voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(voiceStream);
            recordedChunks = [];
            recordingSeconds = 0;
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                
                if (!isCancelled && blob.size > 0 && recordingSeconds >= 1) {
                    showVoiceSending();
                    try {
                        const formData = new FormData();
                        const fileName = `voice-note-${Date.now()}.webm`;
                        const file = new File([blob], fileName, { type: 'audio/webm' });
                        formData.append('file', file);
                        
                        const uploadRes = await fetch(`${API_URL}/upload`, { 
                            method: 'POST', 
                            body: formData 
                        });
                        const uploadData = await uploadRes.json();
                        
                        if (!uploadData.url) {
                            throw new Error('Upload failed');
                        }
                        
                        const payload = {
                            chatId: chatId,
                            from: currentUser.id,
                            to: otherUserId,
                            text: 'Voice note',
                            type: 'voice',
                            payload: uploadData.url,
                            replyTo: replyToMessage?.id || null
                        };
                        socket.emit('send-message', payload);
                        
                        recordedChunks = [];
                        
                    } catch (err) {
                        console.error('Voice upload failed:', err);
                        alert('Failed to send voice note. Please try again.');
                    }
                } else if (blob.size === 0 || recordingSeconds < 1) {
                    showVoiceTooShort();
                } else if (isCancelled) {
                    showVoiceCancelled();
                }
                
                if (voiceStream) {
                    voiceStream.getTracks().forEach(track => track.stop());
                    voiceStream = null;
                }
                
                isRecording = false;
                clearInterval(recordingTimer);
                recordToggle.classList.remove('recording-active');
                recordToggle.innerHTML = '<i class="fas fa-microphone"></i>';
                messageInput.placeholder = 'Type a message...';
                messageInput.disabled = false;
                hideRecordingIndicator();
            };
            
            mediaRecorder.start();
            isRecording = true;
            
            recordToggle.innerHTML = '<i class="fas fa-stop" style="color: #dc2626;"></i>';
            recordToggle.classList.add('recording-active');
            messageInput.placeholder = '🔴 Release to send...';
            messageInput.disabled = true;
            
            showRecordingIndicator();
            
            recordingTimer = setInterval(() => {
                recordingSeconds++;
                updateRecordingIndicator(recordingSeconds);
            }, 1000);
            
        } catch (err) {
            console.error('Recording error:', err);
            alert('Please allow microphone access to record voice notes.');
        }
    }

    function stopVoiceRecording(e) {
        if (e) e.preventDefault();
        if (!isRecording || !mediaRecorder) return;
        
        if (e && e.changedTouches) {
            const touch = e.changedTouches[0];
            const recordBtn = recordToggle.getBoundingClientRect();
            if (touch.clientY < recordBtn.top - 50) {
                isCancelled = true;
            }
        }
        
        try {
            mediaRecorder.stop();
        } catch (err) {
            console.error('Error stopping recorder:', err);
            isRecording = false;
            clearInterval(recordingTimer);
            recordToggle.classList.remove('recording-active');
            recordToggle.innerHTML = '<i class="fas fa-microphone"></i>';
            messageInput.placeholder = 'Type a message...';
            messageInput.disabled = false;
            hideRecordingIndicator();
        }
    }

    function showRecordingIndicator() {
        hideRecordingIndicator();
        
        recordingIndicator = document.createElement('div');
        recordingIndicator.className = 'voice-recording-indicator';
        recordingIndicator.innerHTML = `
            <div class="voice-wave-bars">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <span id="recordingTimerDisplay" style="font-weight:600;min-width:40px;">0s</span>
            <span style="color:#94a3b8;font-size:12px;">Release to send</span>
            <span class="cancel-hint" style="color:#94a3b8;font-size:12px;margin-left:8px;">⬆ Cancel</span>
        `;
        document.body.appendChild(recordingIndicator);
    }

    function updateRecordingIndicator(seconds) {
        const timerDisplay = document.getElementById('recordingTimerDisplay');
        if (timerDisplay) {
            timerDisplay.textContent = `${seconds}s`;
        }
    }

    function hideRecordingIndicator() {
        if (recordingIndicator) {
            recordingIndicator.remove();
            recordingIndicator = null;
        }
    }

    function showVoiceSending() {
        hideRecordingIndicator();
        const toast = document.createElement('div');
        toast.className = 'voice-toast';
        toast.style.background = 'rgba(16, 185, 129, 0.9)';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> Sending...`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 1500);
    }

    function showVoiceTooShort() {
        hideRecordingIndicator();
        const toast = document.createElement('div');
        toast.className = 'voice-toast';
        toast.style.background = 'rgba(239, 68, 68, 0.9)';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> Hold longer to record`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 1500);
    }

    function showVoiceCancelled() {
        hideRecordingIndicator();
        const toast = document.createElement('div');
        toast.className = 'voice-toast';
        toast.style.background = 'rgba(107, 114, 128, 0.9)';
        toast.innerHTML = `<i class="fas fa-times-circle"></i> Cancelled`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 1000);
    }

    function deleteMessage(messageId, deleteForEveryone) {
        socket.emit('delete-message', {
            chatId,
            id: messageId,
            userId: currentUser.id,
            deleteForEveryone: deleteForEveryone || false
        });
    }

    function removeContextMenu() {
        if (contextMenu) {
            contextMenu.remove();
            contextMenu = null;
        }
    }

    // ===== CONTEXT MENU - REAL FIX =====
    function showContextMenu(messageId, x, y, isSent) {
        removeContextMenu();
        
        const message = messages.find(m => String(m.id) === String(messageId));
        if (!message) return;
        
        const ageInMinutes = (new Date() - new Date(message.time)) / (1000 * 60);
        const isNewMessage = ageInMinutes <= 60;
        const isOwnMessage = String(getMessageSenderId(message)) === String(currentUser.id);
        
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        // REMOVED: menu.style.left = x + 'px';
        // REMOVED: menu.style.top = y + 'px';
        // Now positioned by CSS only
        
        let menuHtml = `
            <div class="context-menu-item" data-action="reply"><i class="fas fa-reply"></i> Reply</div>
            <div class="context-menu-item" data-action="select"><i class="fas fa-check-square"></i> Select</div>
        `;
        
        if (message.type === 'text') {
            menuHtml += `<div class="context-menu-item" data-action="copy"><i class="fas fa-copy"></i> Copy</div>`;
        }
        
        if (isOwnMessage) {
            if (message.type === 'text' && ageInMinutes <= 30) {
                menuHtml += `<div class="context-menu-item" data-action="edit"><i class="fas fa-pen"></i> Edit</div>`;
            }
            menuHtml += `<div class="context-menu-divider"></div>
                        <div class="context-menu-item danger" data-action="delete">
                            <i class="fas fa-trash"></i> ${isNewMessage ? 'Unsend for Everyone' : 'Delete for Me'}
                        </div>`;
        } else {
            menuHtml += `<div class="context-menu-divider"></div>
                        <div class="context-menu-item danger" data-action="delete-for-me">
                            <i class="fas fa-trash"></i> Delete for Me
                        </div>
                        <div class="context-menu-item" data-action="report">
                            <i class="fas fa-flag"></i> Report
                        </div>`;
        }
        
        menu.innerHTML = menuHtml;
        document.body.appendChild(menu);
        contextMenu = menu;
        
        menu.querySelectorAll('.context-menu-item').forEach(item => {
            item.addEventListener('click', async () => {
                const action = item.dataset.action;
                switch(action) {
                    case 'reply': replyMessage(messageId); break;
                    case 'select':
                        enterSelectionMode();
                        const cb = document.querySelector(`.message[data-message-id="${messageId}"] .message-checkbox`);
                        if (cb) { cb.checked = true; cb.dispatchEvent(new Event('change')); }
                        break;
                    case 'copy': await navigator.clipboard.writeText(message.text); alert('Message copied'); break;
                    case 'edit': editMessage(messageId); break;
                    case 'delete':
                        const unsend = (new Date() - new Date(message.time)) / (1000 * 60) <= 60;
                        if (confirm(unsend ? 'Unsend for everyone?' : 'Delete for you?')) deleteMessage(messageId, unsend);
                        break;
                    case 'delete-for-me':
                        if (confirm('Delete this message for you?')) deleteMessage(messageId, false);
                        break;
                    case 'report': alert('Message reported to admin.'); break;
                }
                removeContextMenu();
            });
        });
        
        setTimeout(() => {
            const closeMenu = (e) => {
                if (!menu.contains(e.target)) {
                    removeContextMenu();
                    document.removeEventListener('click', closeMenu);
                    document.removeEventListener('touchstart', closeMenu);
                }
            };
            document.addEventListener('click', closeMenu);
            document.addEventListener('touchstart', closeMenu);
        }, 50);
    }

    function replyMessage(messageId) {
        replyToMessage = messages.find(m => String(m.id) === String(messageId)) || null;
        updateReplyPreview();
        messageInput.focus();
    }

    function editMessage(messageId) {
        const message = messages.find(m => String(m.id) === String(messageId));
        if (!message || message.type !== 'text') return;
        const updated = prompt('Edit message', message.text);
        if (!updated || !updated.trim()) return;
        socket.emit('edit-message', { chatId, id: messageId, text: updated.trim(), payload: null });
    }

    function updateReplyPreview() {
        let preview = document.querySelector('.reply-preview-panel');
        if (!preview && replyToMessage) {
            preview = document.createElement('div');
            preview.className = 'reply-preview-panel';
            document.querySelector('.chat-input')?.before(preview);
        }
        if (replyToMessage && preview) {
            const previewText = replyToMessage.type === 'voice' ? 'Voice note' : escapeHtml(replyToMessage.text || '').substring(0, 50);
            preview.innerHTML = `<strong>Replying to:</strong> ${previewText} 
                <button type="button" style="float:right; background:none; border:none; color:#2563eb;" onclick="cancelReply()">Cancel</button>`;
            preview.style.display = 'block';
        } else if (preview) {
            preview.style.display = 'none';
        }
    }

    window.cancelReply = function() {
        replyToMessage = null;
        updateReplyPreview();
    };

    function toggleSelectionForMessage(messageId, shouldSelect = null) {
        const row = document.querySelector(`.message[data-message-id="${messageId}"]`);
        const msgId = String(messageId);
        const nextState = shouldSelect !== null ? shouldSelect : !selectedMessages.has(msgId);

        if (nextState) {
            selectedMessages.add(msgId);
            row?.classList.add('selected');
        } else {
            selectedMessages.delete(msgId);
            row?.classList.remove('selected');
        }

        const checkbox = row?.querySelector('.message-checkbox');
        if (checkbox) checkbox.checked = nextState;
        updateSelectionUI();
    }

    function enterSelectionMode() {
        isSelectionMode = true;
        document.body.classList.add('selection-mode');
        selectionToolbar.style.display = 'flex';
        updateSelectionUI();
    }

    function exitSelectionMode() {
        isSelectionMode = false;
        selectedMessages.clear();
        document.body.classList.remove('selection-mode');
        selectionToolbar.style.display = 'none';
        document.querySelectorAll('.message-checkbox').forEach(cb => cb.remove());
        document.querySelectorAll('.message').forEach(msg => msg.classList.remove('selected'));
    }

    function updateSelectionUI() {
        selectionCountSpan.textContent = `${selectedMessages.size} selected`;
    }

    function openLightbox(src, type) {
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        const vid = document.getElementById('lightbox-video');
        img.style.display = 'none';
        vid.style.display = 'none';
        if (type === 'image') {
            img.src = src;
            img.style.display = 'block';
        } else {
            vid.src = src;
            vid.style.display = 'block';
        }
        lb.classList.add('active');
    }

    function closeLightbox(e) {
        if (e && e.target !== e.currentTarget && e.target.classList?.contains('lightbox-close') === false) return;
        const lb = document.getElementById('lightbox');
        const vid = document.getElementById('lightbox-video');
        if (vid) vid.pause();
        lb.classList.remove('active');
    }

    socket.on('connect', () => {
        updateConnectionStatus('connected', 'Connected');
        socket.emit('join-chat', chatId);
        socket.emit('register-user', currentUser.id);
        if (otherUserId) {
            checkUserStatus();
        }
    });

    socket.on('disconnect', () => {
        updateConnectionStatus('disconnected', 'Disconnected');
    });

    socket.on('new-message', (msg) => {
        if (msg.chatId !== chatId) return;
        messages.push(msg);
        renderMessages();
    });

    socket.on('message-updated', (payload) => {
        if (payload.chatId !== chatId) return;
        const idx = messages.findIndex(m => String(m.id) === String(payload.id));
        if (idx !== -1) {
            messages[idx] = { ...messages[idx], text: payload.text };
            renderMessages();
        }
    });

    socket.on('message-deleted-for-user', (payload) => {
        if (payload.userId == currentUser.id) {
            messages = messages.filter(msg => String(msg.id) !== String(payload.id));
            renderMessages();
            if (isSelectionMode) exitSelectionMode();
        }
    });

    socket.on('message-deleted-for-everyone', (payload) => {
        if (payload.chatId !== chatId) return;
        messages = messages.filter(msg => String(msg.id) !== String(payload.id));
        renderMessages();
        if (isSelectionMode) exitSelectionMode();
    });

    function updateConnectionStatus(status, text) {
        const statusDiv = document.getElementById('connectionStatus');
        if (statusDiv) {
            statusDiv.className = `connection-status ${status}`;
            statusDiv.innerHTML = status === 'connected' ? '<i class="fas fa-check-circle"></i> ' + text : 
                                  status === 'connecting' ? '<i class="fas fa-spinner fa-spin"></i> ' + text : 
                                  '<i class="fas fa-exclamation-triangle"></i> ' + text;
            if (status === 'connected') {
                setTimeout(() => { statusDiv.style.opacity = '0'; setTimeout(() => statusDiv.style.display = 'none', 1000); }, 3000);
            } else {
                statusDiv.style.display = 'flex';
                statusDiv.style.opacity = '1';
            }
        }
    }

    document.getElementById('attachBtn')?.addEventListener('click', () => document.getElementById('mediaInput').click());
    document.getElementById('cameraBtn')?.addEventListener('click', () => document.getElementById('cameraInput').click());
    document.getElementById('sendButton')?.addEventListener('click', sendMessage);
    document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            syncChatLayout();
            if (document.activeElement === messageInput) {
                requestAnimationFrame(() => {
                    messageInput.scrollIntoView({ block: 'end', behavior: 'smooth' });
                });
            }
        });
        window.visualViewport.addEventListener('scroll', syncChatLayout);
    }
    window.addEventListener('resize', syncChatLayout);
    window.addEventListener('orientationchange', syncChatLayout);
    document.addEventListener('focusin', () => {
        syncChatLayout();
        if (document.activeElement === messageInput) {
            setTimeout(() => messageInput.scrollIntoView({ block: 'end' }), 120);
        }
    });
    document.addEventListener('focusout', syncChatLayout);
    
    document.getElementById('mediaInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) await uploadAndSendMedia(file);
        e.target.value = '';
    });
    
    document.getElementById('cameraInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) await uploadAndSendMedia(file);
        e.target.value = '';
    });

    chatUserInfo?.addEventListener('click', () => window.location.href = `profile.html?uid=${otherUserId}`);

    selectModeBtn?.addEventListener('click', enterSelectionMode);
    selectAllBtn?.addEventListener('click', () => {
        document.querySelectorAll('.message').forEach(el => {
            const msgId = el.getAttribute('data-message-id');
            if (msgId) { selectedMessages.add(msgId); el.classList.add('selected'); }
        });
        updateSelectionUI();
    });
    deleteSelectedBtn?.addEventListener('click', () => {
        if (selectedMessages.size === 0) return;
        if (confirm(`Delete ${selectedMessages.size} selected message(s)?`)) {
            selectedMessages.forEach(msgId => {
                const msg = messages.find(m => String(m.id) === String(msgId));
                if (msg) {
                    const msgAge = (new Date() - new Date(msg.time)) / (1000 * 60);
                    const isOwnMessage = String(getMessageSenderId(msg)) === String(currentUser.id);
                    const unsend = isOwnMessage && msgAge <= 60;
                    deleteMessage(msgId, unsend);
                }
            });
            exitSelectionMode();
        }
    });
    closeSelectionBtn?.addEventListener('click', exitSelectionMode);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeLightbox();
            if (isSelectionMode) exitSelectionMode();
            removeContextMenu();
        }
    });

    window.addEventListener('beforeunload', () => {
        if (voiceStream) {
            voiceStream.getTracks().forEach(track => track.stop());
        }
        hideRecordingIndicator();
    });

    // ===== INITIALIZE KEYBOARD FIX =====
    if (typeof fixChatKeyboard === 'function') {
        fixChatKeyboard();
    }

    syncChatLayout();
    loadChatUser();
    loadMessages();
    // ===== iOS AUDIO UNLOCK =====
document.addEventListener('touchstart', function() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') {
            ctx.resume();
            console.log('✅ iOS audio unlocked via touch');
        }
    } catch(e) {}
}, { once: true, passive: true });

// Also unlock on click
document.addEventListener('click', function() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') {
            ctx.resume();
        }
    } catch(e) {}
}, { once: true, passive: true });
