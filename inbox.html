    <link rel="stylesheet" href="styles.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .mesh-gradient {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(37, 99, 235, 0.15), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(139, 92, 246, 0.12), transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(6, 182, 212, 0.1), transparent 50%);
            animation: slowRotate 30s infinite linear;
        }

        @keyframes slowRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fast-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--primary, #2563eb);
            border-radius: 50%;
            opacity: 0;
            animation: fastFloat 6s infinite ease-in-out;
        }

        @keyframes fastFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: fastPulse 4s infinite alternate ease-in-out;
        }

        @keyframes fastPulse {
            0% { transform: scale(0.8); opacity: 0.3; }
            100% { transform: scale(1.4); opacity: 0.7; }
        }

        .dance-shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(139, 92, 246, 0.06));
            animation: dance 12s infinite alternate ease-in-out;
        }

        @keyframes dance {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(0deg) scale(1) translate(0, 0); }
            25% { border-radius: 58% 42% 75% 25% / 43% 37% 63% 57%; transform: rotate(90deg) scale(1.1) translate(20px, -20px); }
            50% { border-radius: 84% 16% 58% 42% / 55% 73% 27% 45%; transform: rotate(180deg) scale(1.2) translate(-20px, 20px); }
            75% { border-radius: 40% 60% 33% 67% / 58% 40% 60% 42%; transform: rotate(270deg) scale(1.05) translate(30px, 30px); }
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(360deg) scale(1) translate(0, 0); }
        }

        .floating-card {
            position: absolute;
            width: 60px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: floatCard 15s infinite ease-in-out;
        }

        @keyframes floatCard {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .light-ray {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #2563eb, transparent);
            animation: lightSweep 8s infinite linear;
            opacity: 0.3;
        }

        @keyframes lightSweep {
            0% { transform: translateX(-100%); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        .moving-line {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(37, 99, 235, 0.03) 50px, rgba(37, 99, 235, 0.03) 100px);
            animation: slideLines 20s infinite linear;
        }

        @keyframes slideLines {
            0% { background-position: 0 0; }
            100% { background-position: 200px 200px; }
        }

        /* Dark mode enhancements */
        body.dark-active .mesh-gradient {
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.25), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(139, 92, 246, 0.2), transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(6, 182, 212, 0.15), transparent 50%);
        }

        body.dark-active .fast-particle {
            background: #60a5fa;
            box-shadow: 0 0 4px #60a5fa;
        }

        body.dark-active .glow-orb {
            filter: blur(100px);
        }

        body.dark-active .dance-shape {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.12));
        }

        body.dark-active .light-ray {
            background: linear-gradient(90deg, transparent, #60a5fa, transparent);
            opacity: 0.5;
        }

        body.dark-active .star {
            background: #a78bfa;
            box-shadow: 0 0 4px #a78bfa;
        }

        body.dark-active .moving-line {
            background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(59, 130, 246, 0.08) 50px, rgba(59, 130, 246, 0.08) 100px);
        }

        /* Main content wrapper */
        .content-wrapper {
            position: relative;
            z-index: 1;
        }
        
        .inbox-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        
        .inbox-header {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 20px 20px 0 0;
        }
        
        .inbox-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }
        
        .header-actions {
            display: flex;
            gap: 20px;
        }
        
        .header-actions button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .header-actions button:hover {
            transform: scale(1.1);
        }
        
        .tabs {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            padding: 0 20px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 70px;
            z-index: 99;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            color: #666;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        
        .tab.active {
            color: #2563eb;
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: #2563eb;
            border-radius: 3px 3px 0 0;
        }
        
        .chat-list {
            background: transparent;
            border-radius: 0;
            min-height: 400px;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
            background: rgba(255, 255, 255, 0.6);
        }
        
        .chat-item:hover {
            background: rgba(255, 255, 255, 0.9);
        }
        
        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .chat-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        
        .chat-name span:first-child {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            font-size: 0.7rem;
            color: #999;
            font-weight: normal;
            flex-shrink: 0;
            margin-left: 10px;
        }
        
        .chat-last-message {
            font-size: 0.85rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-last-message i {
            font-size: 0.7rem;
            margin-right: 3px;
        }
        
        .unread-badge {
            background: #2563eb;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #e0e0e0;
            z-index: 100;
        }
        
        .nav-item {
            text-align: center;
            color: #999;
            text-decoration: none;
            font-size: 0.7rem;
            flex: 1;
            transition: color 0.2s;
        }
        
        .nav-item i {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 4px;
        }
        
        .nav-item.active {
            color: #2563eb;
        }
        
        .nav-item:hover {
            color: #2563eb;
        }
        
        .search-bar {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid #e0e0e0;
        }
        
        .search-bar input {
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: #f0f2f5;
            border-radius: 30px;
            font-size: 0.9rem;
            outline: none;
        }
        
        .refresh-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 15px;
        }

        /* Dark mode */
        body.dark-active .inbox-container {
            background: rgba(30, 41, 59, 0.92);
        }

        body.dark-active .tabs {
            background: rgba(30, 41, 59, 0.9);
            border-bottom-color: #334155;
        }

        body.dark-active .tab {
            color: #94a3b8;
        }

        body.dark-active .tab.active {
            color: #60a5fa;
        }

        body.dark-active .chat-item {
            background: rgba(30, 41, 59, 0.6);
            border-bottom-color: #334155;
        }

        body.dark-active .chat-item:hover {
            background: rgba(30, 41, 59, 0.9);
        }

        body.dark-active .chat-name {
            color: #f1f5f9;
        }

        body.dark-active .chat-last-message {
            color: #94a3b8;
        }

        body.dark-active .search-bar {
            background: rgba(30, 41, 59, 0.8);
        }

        body.dark-active .search-bar input {
            background: #1e293b;
            color: white;
        }

        body.dark-active .search-bar input::placeholder {
            color: #64748b;
        }

        body.dark-active .bottom-nav {
            background: rgba(30, 41, 59, 0.95);
            border-top-color: #334155;
        }

        body.dark-active .nav-item {
            color: #64748b;
        }

        body.dark-active .nav-item.active {
            color: #60a5fa;
        }

        body.dark-active .empty-state {
            color: #94a3b8;
        }

        body.dark-active .loading {
            color: #94a3b8;
        }
        
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .inbox-container {
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }
            .inbox-header {
                border-radius: 0;
            }
        }
    </style>
</head>

    let currentLanguage = localStorage.getItem('language') || 'en';

    function updatePageLanguage() {
        const t = translations[currentLanguage] || translations.en;
        
        document.getElementById('chatsTitle').textContent = t.chatsTitle;
        document.getElementById('searchInput').placeholder = t.searchPlaceholder;
        document.getElementById('tabAll').textContent = t.tabAll;
        document.getElementById('tabUnread').textContent = t.tabUnread;
        document.getElementById('tabCalls').textContent = t.tabCalls;
        document.getElementById('tabWorkers').textContent = t.tabWorkers;
        document.getElementById('tabCustomers').textContent = t.tabCustomers;
        document.getElementById('loadingText').textContent = t.loadingText;
        document.getElementById('navHome').textContent = t.navHome;
        document.getElementById('navChats').textContent = t.navChats;
        document.getElementById('navCalls').textContent = t.navCalls;
        document.getElementById('navWorkers').textContent = t.navWorkers;
        document.getElementById('navProfile').textContent = t.navProfile;
        
        window.currentTranslations = t;
    }

    // Listen for language changes from homepage
    window.addEventListener('storage', function(e) {
        if (e.key === 'language') {
            currentLanguage = e.newValue || 'en';
            updatePageLanguage();
            renderChatList();
        }
    });
    
    function checkLanguageChange() {
        const newLang = localStorage.getItem('language') || 'en';
        if (newLang !== currentLanguage) {
            currentLanguage = newLang;
            updatePageLanguage();
            renderChatList();
        }
    }
    setInterval(checkLanguageChange, 500);

    // ==================== DARK MODE - RESPONSIVE TO HOMEPAGE ====================
    const DARK_MODE_KEY = 'laborconnect-dark-mode';
    
    function applyDarkMode() {
        const isDarkActive = localStorage.getItem(DARK_MODE_KEY) === 'true';
        if (isDarkActive) {
            document.body.classList.add('dark-active');
        } else {
            document.body.classList.remove('dark-active');
        }
    }
    
    window.addEventListener('storage', function(e) {
        if (e.key === DARK_MODE_KEY) {
            applyDarkMode();
        }
    });
    
    function checkDarkModeChange() {
        const isDarkActive = localStorage.getItem(DARK_MODE_KEY) === 'true';
        if (isDarkActive && !document.body.classList.contains('dark-active')) {
            document.body.classList.add('dark-active');
        } else if (!isDarkActive && document.body.classList.contains('dark-active')) {
            document.body.classList.remove('dark-active');
        }
    }
    setInterval(checkDarkModeChange, 500);
    
    applyDarkMode();

    // ==================== INBOX FUNCTIONS ====================
    const currentUser = JSON.parse(localStorage.getItem('user') || 'null');
    
    if (!currentUser || !currentUser.id) {
        window.location.href = 'login.html';
    }
    
    document.getElementById('profileNav').href = `profile.html?uid=${currentUser.id}`;
    
    let allConversations = [];
    let currentTab = 'all';
    let searchQuery = '';
    let isLoading = false;
    
    async function loadConversations() {
        if (isLoading) return;
        isLoading = true;
        
        const container = document.getElementById('chatList');
        const t = window.currentTranslations || translations.en;
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>' + t.loadingText + '</p></div>';
        
        try {
            let response = await fetch(`${API_URL}/conversations/${currentUser.id}`);
            
            if (!response.ok) {
                await loadMessagesAndGroup();
                return;
            }
            
            const conversations = await response.json();
            
            if (conversations && conversations.length > 0) {
                allConversations = conversations;
                renderChatList();
            } else {
                await loadMessagesAndGroup();
            }
            
        } catch (error) {
            console.error('Error loading conversations:', error);
            await loadMessagesAndGroup();
        }
        
        isLoading = false;
    }
    
    async function loadMessagesAndGroup() {
        const t = window.currentTranslations || translations.en;
        try {
            const usersRes = await fetch(`${API_URL}/users`);
            const allUsers = await usersRes.json();
            
            const userMap = new Map();
            allUsers.forEach(user => {
                userMap.set(String(user.id), user);
            });
            
            const messagesRes = await fetch(`${API_URL}/messages/user/${currentUser.id}`);
            const allMessages = await messagesRes.json();
            
            if (!allMessages || allMessages.length === 0) {
                document.getElementById('chatList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p>${t.emptyTitle}</p>
                        <button class="btn btn-primary mt-3" onclick="window.location.href='worker-directory.html'">
                            ${t.startChat}
                        </button>
                    </div>
                `;
                return;
            }
            
            const conversationMap = new Map();
            
            allMessages.forEach(msg => {
                const senderId = String(msg.fromuser || msg.fromUser || msg.from || '');
                const receiverId = String(msg.touser || msg.toUser || msg.to || '');
                const otherId = senderId === String(currentUser.id) ? receiverId : senderId;
                
                if (!otherId || otherId === 'undefined' || otherId === '') return;
                
                if (!conversationMap.has(otherId)) {
                    conversationMap.set(otherId, {
                        userId: otherId,
                        messages: [],
                        lastMessage: null,
                        lastMessageTime: null,
                        unreadCount: 0
                    });
                }
                
                const conv = conversationMap.get(otherId);
                conv.messages.push(msg);
                
                const msgTime = new Date(msg.time || Date.now());
                if (!conv.lastMessageTime || msgTime > conv.lastMessageTime) {
                    conv.lastMessage = msg;
                    conv.lastMessageTime = msgTime;
                }
                
                if (senderId !== String(currentUser.id) && !(msg.read === true || msg.read === 'true')) {
                    conv.unreadCount++;
                }
            });
            
            allConversations = Array.from(conversationMap.values())
                .map(conv => {
                    const user = userMap.get(String(conv.userId));
                    const lastMessage = conv.lastMessage;
                    return {
                        userId: conv.userId,
                        userName: user?.name || `User ${conv.userId}`,
                        userType: user?.userType || user?.usertype || 'User',
                        photoURL: user?.photoURL || user?.photourl || null,
                        lastMessage: lastMessage?.text || lastMessage?.payload || 'No messages yet',
                        lastMessageTime: conv.lastMessageTime,
                        lastMessageType: lastMessage?.type || 'text',
                        unreadCount: conv.unreadCount
                    };
                })
                .sort((a, b) => {
                    if (!a.lastMessageTime) return 1;
                    if (!b.lastMessageTime) return -1;
                    return new Date(b.lastMessageTime) - new Date(a.lastMessageTime);
                });
            
            renderChatList();
            
        } catch (error) {
            console.error('Error loading messages:', error);
            document.getElementById('chatList').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>${t.errorTitle}</p>
                    <button class="btn btn-primary mt-3" onclick="loadConversations()">
                        ${t.retry}
                    </button>
                </div>
            `;
        }
    }
    
    function renderChatList() {
        const t = window.currentTranslations || translations.en;
        let filtered = [...allConversations];
        
        if (searchQuery) {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(conv => 
                conv.userName.toLowerCase().includes(query)
            );
        }
        
        if (currentTab === 'unread') {
            filtered = filtered.filter(conv => conv.unreadCount > 0);
        } else if (currentTab === 'workers') {
            filtered = filtered.filter(conv => conv.userType === 'Worker');
        } else if (currentTab === 'customers') {
            filtered = filtered.filter(conv => conv.userType === 'Customer');
        }
        
        const container = document.getElementById('chatList');
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>${t.emptyTitle}</p>
                    ${searchQuery ? '<p>Try a different search</p>' : `<button class="btn btn-primary mt-3" onclick="window.location.href='worker-directory.html'">${t.startChat}</button>`}
                </div>
            `;
            return;
        }
        
        container.innerHTML = filtered.map(conv => `
            <a href="chat.html?with=${conv.userId}" class="chat-item" onclick="markAsRead('${conv.userId}')">
                <div class="chat-avatar">
                    ${conv.photoURL ? 
                        `<img src="${conv.photoURL}" alt="${escapeHtml(conv.userName)}">` : 
                        `<span>${(conv.userName?.charAt(0) || 'U').toUpperCase()}</span>`
                    }
                </div>
                <div class="chat-info">
                    <div class="chat-name">
                        <span>${escapeHtml(conv.userName)}</span>
                        <span class="chat-time">${formatTime(conv.lastMessageTime)}</span>
                    </div>
                    <div class="chat-last-message">
                        ${conv.lastMessageType === 'voice' ? '<i class="fas fa-microphone"></i> Voice note' : 
                          conv.lastMessageType === 'media' ? '<i class="fas fa-image"></i> Media' :
                          escapeHtml(conv.lastMessage?.substring(0, 50) || 'No messages')}
                        ${conv.lastMessage?.length > 50 ? '...' : ''}
                    </div>
                </div>
                ${conv.unreadCount > 0 ? `<div class="unread-badge">${conv.unreadCount}</div>` : ''}
            </a>
        `).join('');
    }
    
    async function markAsRead(otherUserId) {
        try {
            await fetch(`${API_URL}/messages/read`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: currentUser.id,
                    otherUserId: otherUserId
                })
            });
        } catch(e) {
            console.log('Error marking as read:', e);
        }
    }
    
    function formatTime(date) {
        if (!date) return '';
        const d = new Date(date);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (d >= today) {
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else if (d >= yesterday) {
            return 'Yesterday';
        } else {
            return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
    
    // ==================== SOCKET EVENT HANDLERS (FIXED) ====================
    if (socket) {
        socket.on('connect', () => {
            console.log('Socket connected for inbox');
            if (socket.id) {
                // FIXED: Changed from 'join-user' to 'register-user' to match server
                socket.emit('register-user', currentUser.id);
            }
        });
        
        socket.on('new-message', (msg) => {
            console.log('New message received, refreshing inbox');
            loadConversations();
        });
        
        // Handle reconnection
        socket.on('reconnect', () => {
            console.log('Socket reconnected, re-registering user');
            socket.emit('register-user', currentUser.id);
            loadConversations();
        });
        
        // Handle disconnect
        socket.on('disconnect', () => {
            console.log('Socket disconnected from inbox');
        });
    }
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            if (tab.dataset.tab === 'calls') {
                window.location.href = 'calls.html';
                return;
            }
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.dataset.tab;
            renderChatList();
        });
    });
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderChatList();
    });
    
    window.loadConversations = loadConversations;
    window.markAsRead = markAsRead;
    window.logout = logout;
    
    updatePageLanguage();
    loadConversations();
    setInterval(loadConversations, 15000);
</script>
